<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물리1 풀이 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;
  --accent:#2563eb;--accent-light:#dbeafe;
  --green:#16a34a;--red:#dc2626;--red-light:#fee2e2;--yellow:#d97706;
  --text:#1a1917;--text2:#6b6860;--text3:#a8a49e;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:14px;line-height:1.7;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text3);}
.api-wrap{display:flex;align-items:center;gap:8px;}
.api-label{font-size:11px;color:var(--text2);white-space:nowrap;}
.api-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;outline:none;width:200px;transition:border-color .15s;}
.api-input:focus{border-color:var(--accent);}
.container{max-width:900px;margin:0 auto;padding:24px 16px 120px;}
.bulk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.bulk-grid{grid-template-columns:1fr;}.api-input{width:130px;}.header-sub{display:none;}}
.bulk-zone{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.bulk-zone-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.bulk-zone-title{font-size:12px;font-weight:700;color:var(--text2);}
.bulk-drop-area{padding:20px 14px;text-align:center;cursor:pointer;transition:background .12s;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.bulk-drop-area:hover{background:var(--accent-light);}
.bulk-drop-icon{font-size:26px;}
.bulk-drop-text{font-size:12px;color:var(--text2);}
.bulk-drop-sub{font-size:11px;color:var(--text3);}
.bulk-file-input{display:none;}
.bulk-preview-grid{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;}
.bulk-img-wrap{position:relative;display:inline-block;}
.bulk-img{width:76px;height:76px;object-fit:cover;border-radius:7px;border:1px solid var(--border);display:block;cursor:pointer;transition:transform .1s;}
.bulk-img:hover{transform:scale(1.05);}
.bulk-img-remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bulk-img-name{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bulk-add-btn{width:76px;height:76px;border:2px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:var(--text3);background:transparent;transition:all .12s;}
.bulk-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.bulk-text-area{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;line-height:1.7;padding:10px 14px;resize:vertical;min-height:60px;outline:none;}
.bulk-text-area::placeholder{color:var(--text3);}
.img-badge{background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'JetBrains Mono',monospace;}
textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.7;padding:12px 14px;resize:vertical;min-height:80px;outline:none;}
textarea::placeholder{color:var(--text3);}
.range-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);resize:none;outline:none;min-height:48px;}
.range-input::placeholder{color:var(--text3);}
.analyze-wrap{position:fixed;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;justify-content:center;z-index:100;}
.analyze-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px 40px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:480px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(37,99,235,.35);}
.analyze-btn:hover{background:#1d4ed8;transform:translateY(-1px);}
.analyze-btn:active{transform:scale(.98);}
.result-section{display:none;}
.result-section.visible{display:block;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.result-title{font-size:16px;font-weight:700;}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .12s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.prob-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);}
.prob-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:20px;box-shadow:var(--shadow);}
.summary-card-header{padding:14px 18px;background:var(--text);color:#fff;font-size:13px;font-weight:700;}
.total-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden;box-shadow:var(--shadow);}
.total-card-header{padding:14px 18px;background:var(--text);color:#fff;font-size:13px;font-weight:700;}
.stream-text{color:var(--text);font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:keep-all;padding:16px 18px;}
.loading-wrap{padding:48px 16px;text-align:center;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--text2);font-size:13px;}
.error-box{background:var(--red-light);border:1px solid #fca5a5;border-radius:10px;padding:14px 16px;color:var(--red);font-size:13px;margin-bottom:14px;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;}
.lightbox-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <div>
      <div class="header-title">물리1 풀이 분석기</div>
      <div class="header-sub">Gemini AI 기반 역량 피드백</div>
    </div>
  </div>
  <div class="api-wrap">
    <button id="mockToggle" onclick="toggleMock()" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:600;">🧪 목업 모드 OFF</button>
    <span class="api-label">🔑 API Key</span>
    <input class="api-input" type="password" id="apiKey" placeholder="AIza... (Google AI Studio)"/>
  </div>
</div>

<div id="mockBanner" style="display:none;background:#fef3c7;border-bottom:1px solid #fde68a;padding:8px 20px;text-align:center;font-size:12px;color:#92400e;font-weight:600;">
  🧪 목업 모드 활성화 — API를 호출하지 않고 샘플 결과를 보여줍니다
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="container">
  <div id="inputView">
    <div id="modeB">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:14px;box-shadow:var(--shadow);">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;">분석할 문제 범위 (선택)</div>
        <textarea class="range-input" id="bulk-range" placeholder="예: 5번~9번 문제입니다 / 사진에서 모든 문제를 자동으로 찾아 분석"></textarea>
      </div>

      <!-- 학생 정답 입력 -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:12px;font-weight:700;color:var(--text2)">✅ 학생 선택 정답 입력</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--text3)">문제 수</span>
            <div style="display:flex;gap:4px;" id="bulk-count-btns"></div>
          </div>
        </div>
        <div id="bulk-answer-grid" style="display:flex;flex-direction:column;gap:6px;"></div>
      </div>

      <div class="bulk-grid">
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">📝 문제 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-q" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-q"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 추가</span><span class="bulk-drop-sub">한 장에 여러 문제 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-q" accept="image/*" multiple onchange="bulkUpload('q',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-q"></div>
          <textarea class="bulk-text-area" id="bulk-text-q" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">✅ 정답·해설 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-a" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-a"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 추가</span><span class="bulk-drop-sub">한 장에 여러 정답 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-a" accept="image/*" multiple onchange="bulkUpload('a',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-a"></div>
          <textarea class="bulk-text-area" id="bulk-text-a" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">✏️ 학생 풀이 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-s" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-s"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 추가</span><span class="bulk-drop-sub">한 장에 여러 풀이 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-s" accept="image/*" multiple onchange="bulkUpload('s',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-s"></div>
          <textarea class="bulk-text-area" id="bulk-text-s" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
      </div>
    </div>
    <div style="height:80px"></div>
  </div>

  <div id="resultView" class="result-section">
    <div class="result-header">
      <div class="result-title">📊 분석 결과</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="back-btn" id="pdfBtn" onclick="downloadPDF()" style="background:var(--accent);color:#fff;border-color:var(--accent)">⬇ PDF 저장</button>
        <button class="back-btn" onclick="goBack()">← 다시 입력</button>
      </div>
    </div>
    <div id="resultContent"></div>
    <div style="height:80px"></div>
  </div>
</div>

<div class="analyze-wrap" id="analyzeWrap">
  <button class="analyze-btn" onclick="analyze()">⚡ AI 분석 시작</button>
</div>

<script>
let currentMode='B', isMock=false;
const bulkStore={q:[],a:[],s:[]};
let bulkProblemCount=0;
const bulkStudentAnswers={};
const bulkCorrectAnswers={};

function setBulkCount(n, btn){
  bulkProblemCount=n;
  for(let i=1;i<=10;i++){
    const b=document.getElementById(`bulk_count_${i}`);
    if(b){b.style.background=i===n?'var(--accent)':'var(--surface2)';b.style.color=i===n?'#fff':'var(--text2)';b.style.borderColor=i===n?'var(--accent)':'var(--border)';}
  }
  const grid=document.getElementById('bulk-answer-grid');
  grid.innerHTML='';
  for(let i=1;i<=n;i++){
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;';

    // 번호 배지
    const badge=document.createElement('span');
    badge.style.cssText='font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 7px;border-radius:4px;min-width:40px;text-align:center;';
    badge.textContent=i+'번';
    row.appendChild(badge);

    // 정답 칸 (파란색)
    const corrWrap=document.createElement('div');
    corrWrap.style.cssText='display:flex;align-items:center;gap:5px;';
    const corrLabel=document.createElement('span');
    corrLabel.style.cssText='font-size:10px;font-weight:700;color:#1d4ed8;white-space:nowrap;';
    corrLabel.textContent='정답';
    corrWrap.appendChild(corrLabel);
    ['①','②','③','④','⑤'].forEach(v=>{
      const b=document.createElement('button');
      b.id=`bulk_corr_${i}_${v}`;
      b.textContent=v;
      b.style.cssText='width:27px;height:27px;border-radius:5px;border:1.5px solid #bfdbfe;background:#fff;color:#1d4ed8;font-size:12px;cursor:pointer;font-weight:600;';
      b.addEventListener('click',(function(num,val,el){return function(){setBulkCorrect(num,val,el);};})(i,v,b));
      corrWrap.appendChild(b);
    });
    const corrDisplay=document.createElement('span');
    corrDisplay.id=`bulk_corr_display_${i}`;
    corrDisplay.style.cssText='font-size:10px;color:#6b6860;margin-left:2px;';
    corrDisplay.textContent='미입력';
    corrWrap.appendChild(corrDisplay);
    row.appendChild(corrWrap);

    // 학생 칸 (회색)
    const ansWrap=document.createElement('div');
    ansWrap.style.cssText='display:flex;align-items:center;gap:5px;';
    const ansLabel=document.createElement('span');
    ansLabel.style.cssText='font-size:10px;font-weight:600;color:var(--text2);white-space:nowrap;';
    ansLabel.textContent='학생';
    ansWrap.appendChild(ansLabel);
    ['①','②','③','④','⑤'].forEach(v=>{
      const b=document.createElement('button');
      b.id=`bulk_ans_${i}_${v}`;
      b.textContent=v;
      b.style.cssText='width:27px;height:27px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;';
      b.addEventListener('click',(function(num,val,el){return function(){setBulkAnswer(num,val,el);};})(i,v,b));
      ansWrap.appendChild(b);
    });
    const ansDisplay=document.createElement('span');
    ansDisplay.id=`bulk_ans_display_${i}`;
    ansDisplay.style.cssText='font-size:10px;color:var(--text3);margin-left:2px;';
    ansDisplay.textContent='미선택';
    ansWrap.appendChild(ansDisplay);
    row.appendChild(ansWrap);

    grid.appendChild(row);
  }
}

function setBulkCorrect(num, val, btn){
  bulkCorrectAnswers[num]=val;
  ['①','②','③','④','⑤'].forEach(v=>{
    const b=document.getElementById(`bulk_corr_${num}_${v}`);
    if(b){b.style.background='#fff';b.style.color='#1d4ed8';b.style.borderColor='#bfdbfe';}
  });
  btn.style.background='#1d4ed8';btn.style.color='#fff';btn.style.borderColor='#1d4ed8';
  const d=document.getElementById(`bulk_corr_display_${num}`);
  if(d)d.textContent=`정답: ${val}`;
}

function setBulkAnswer(num, val, btn){
  bulkStudentAnswers[num]=val;
  ['①','②','③','④','⑤'].forEach(v=>{
    const b=document.getElementById(`bulk_ans_${num}_${v}`);
    if(b){b.style.background='var(--surface)';b.style.color='var(--text2)';b.style.borderColor='var(--border)';}
  });
  btn.style.background='var(--accent)';btn.style.color='#fff';btn.style.borderColor='var(--accent)';
  const d=document.getElementById(`bulk_ans_display_${num}`);
  if(d)d.textContent=`선택: ${val}`;
}


const MOCK_RESPONSE=`=============================

▶ 2. 정오답 판단
X

▶ 3. 문제 풀이법

2단계: 작용점 목록 — F(반시계, d), 나무판 20N(시계, 4d), 물체 50N(시계, 9d)
3단계: F x d = 20N x 4d + 50N x 9d = 80d + 450d = 530d
4단계: F = 570N → 정답 ③

▶ 4. 풀이 피드백
- 틀린 부분: 나무판 무게(20N) 항 20N x 4d = 80d를 식에서 누락하고 F x d = 450d로 계산했습니다.
- 올바른 내용: F x d = 20N x 4d + 50N x 9d = 530d로 세워야 합니다.
- 틀린 이유: 나무판 무게중심 위치(4d)가 주어진 이유를 파악하지 못했습니다.
- 풀이 방식 개선점: 풀이 시작 전 작용점 목록을 먼저 나열한 뒤 식을 세우세요.

▶ 5. 역량 점수
- 개념 이해도: 7점 / 10점 | 이유: 돌림힘 개념은 알지만 모든 작용점 적용이 미흡합니다.
- 풀이 전개력: 6점 / 10점 | 이유: 식 구조는 맞으나 항 누락으로 잘못 전개되었습니다.
- 문제 해석력: 5점 / 10점 | 이유: 나무판 무게중심 위치(4d) 조건의 의미를 파악하지 못했습니다.
- 합계: 18점 / 30점

=============================
문제 6 피드백
=============================

▶ 1. 정답
①

▶ 2. 정오답 판단
O

▶ 5. 역량 점수
- 개념 이해도: 10점 / 10점 | 이유: 만점
- 풀이 전개력: 10점 / 10점 | 이유: 만점
- 문제 해석력: 10점 / 10점 | 이유: 만점

function correctPhysicsText(text){
  const corrections=[
    [/출퇴/g,'출제'],[/질감/g,'질량'],[/무계\b/g,'무게'],[/속도\b/g,'속력'],
    [/떨어지지\s*않다/g,'떨어지지 않다'],[/떨어지지않다/g,'떨어지지 않다'],
    [/떨어지지\s*않는/g,'떨어지지 않는'],[/막돼/g,'막대'],
    [/수직\s*횡력/g,'수직항력'],[/수직횡력/g,'수직항력'],
    [/관성\s*의\s*법착/g,'관성의 법칙'],[/작용\s*반작용/g,'작용 반작용'],
    [/운동\s*에네지/g,'운동 에너지'],[/운동에네지/g,'운동 에너지'],
    [/퍼텐\s*셜/g,'퍼텐셜'],[/역학적\s*에네지/g,'역학적 에너지'],
    [/마철/g,'마찰'],[/마찰력\s*계수/g,'마찰 계수'],[/충격\s*량/g,'충격량'],
    [/운동\s*량/g,'운동량'],[/돌림\s*힘/g,'돌림힘'],[/도르\s*래/g,'도르래'],
    [/탄성\s*력/g,'탄성력'],[/합력\s*/g,'합력'],[/알짜\s*힘/g,'알짜힘'],
  ];
  let result=text;
  corrections.forEach(([pat,rep])=>{result=result.replace(pat,rep);});
  return result;
}

function renderResult(text,container){
  lastRawText=text;
  const corrected=correctPhysicsText(text);
  container.innerHTML='';

  // Gemini가 ===== 앞에 불필요한 텍스트를 붙이는 경우 제거
  // 첫 번째 ===== 이전 텍스트를 버림
  const firstSep = corrected.indexOf('=====');
  const cleanText = firstSep > 0 ? corrected.slice(firstSep) : corrected;

  const lines=cleanText.split('\n');
  let html='',inCard=false,inScoreGrid=false,inTable=false;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 열린 요소 닫기
  const closeScoreGrid=()=>{if(inScoreGrid){html+=`</div>`;inScoreGrid=false;}};
  const closeTable=()=>{if(inTable){html+=`</tbody></table></div>`;inTable=false;}};
  const closeCard=()=>{closeScoreGrid();closeTable();if(inCard){html+=`</div></div>`;inCard=false;}};

  const openCard=(title,isSummary)=>{
    closeCard();
    html+=`<div class="${isSummary?'total-card':'prob-card'}" style="margin-bottom:14px">`;
    html+=`<div class="${isSummary?'total-card-header':'prob-card-header'}" style="padding:14px 18px;font-size:13px;font-weight:700">${esc(title)}</div>`;
    html+=`<div style="padding:16px 18px">`;
    inCard=true;
  };

  for(let i=0;i<lines.length;i++){
    const trimmed=lines[i].trim();

    // ===== 구분선 → 새 카드
    if(/^={4,}/.test(trimmed)){
      const next=(lines[i+1]||'').trim();
      if(next&&!/^={4,}/.test(next)){
        i++;
        openCard(next,next.includes('총평'));
        if((lines[i+1]||'').trim().startsWith('='))i++;
      }
      continue;
    }

    // 카드가 없으면 자동 생성
    if(!inCard){html+=`<div class="prob-card" style="margin-bottom:14px"><div style="padding:16px 18px">`;inCard=true;}

    // ▶ 항목 제목
    if(/^▶/.test(trimmed)){
      closeScoreGrid();closeTable();
      html+=`<div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;display:flex;align-items:center;gap:6px"><span style="width:3px;height:12px;background:var(--accent);border-radius:2px;display:inline-block;flex-shrink:0"></span>${esc(trimmed.replace(/^▶\s*/,''))}</div>`;
      continue;
    }

    // 풀이 단계
    if(/^\d+단계[:\s]/.test(trimmed)){
      const nm=trimmed.match(/^(\d+)단계[:\s]+(.*)/);
      if(nm){
        html+=`<div style="display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border-radius:7px;padding:8px 12px;margin-bottom:6px"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);min-width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 3px">${nm[1]}</span><span style="font-size:13px;color:var(--text);line-height:1.6">${esc(nm[2])}</span></div>`;
        continue;
      }
    }

    // - 항목들
    if(/^-\s+/.test(trimmed)){
      const scoreM=trimmed.match(/^-\s+(개념 이해도|풀이 전개력|문제 해석력):\s*(\d+)점\s*\/\s*10점(?:\s*\|\s*이유:\s*(.*))?/);
      const totalM=trimmed.match(/^-\s+합계:\s*(\d+)점\s*\/\s*30점/);

      if(scoreM){
        const label=scoreM[1],score=parseInt(scoreM[2]),reason=scoreM[3]||'';
        const isPerfect=score===10;
        const col=isPerfect?'var(--green)':score>=8?'var(--accent)':score>=6?'var(--yellow)':'var(--red)';
        // 첫 번째 역량 항목에서 grid 열기
        if(label==='개념 이해도'){
          closeScoreGrid();
          html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">`;
          inScoreGrid=true;
        }
        html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px">`;
        html+=`<div style="font-size:10px;color:var(--text2);margin-bottom:4px">${esc(label)}</div>`;
        html+=`<div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:${col};line-height:1">${score}</div>`;
        html+=`<div style="font-size:9px;color:var(--text3);margin-bottom:6px">/ 10점</div>`;
        if(!isPerfect&&reason&&reason!=='만점'){
          html+=`<div style="font-size:11px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:6px;margin-top:2px">${esc(reason)}</div>`;
        }
        html+=`</div>`;
        continue;
      }

      if(totalM){
        closeScoreGrid();
        html+=`<div style="display:flex;align-items:center;justify-content:flex-end;margin-top:6px;gap:6px">`;
        html+=`<span style="font-size:12px;color:var(--text2)">합계</span>`;
        html+=`<span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green)">${totalM[1]}</span>`;
        html+=`<span style="font-size:11px;color:var(--text3)">/ 30점</span></div>`;
        continue;
      }

      // 일반 - 항목
      closeScoreGrid();
      html+=`<div style="font-size:13px;color:var(--text);line-height:1.8;padding:4px 0 4px 12px;border-left:2px solid var(--border);margin-bottom:2px">${esc(trimmed)}</div>`;
      continue;
    }

    // 파이프 표
    if(/^\|/.test(trimmed)){
      // 구분선 줄 건너뛰기
      if(/^\|[-| ]+\|$/.test(trimmed))continue;
      const cells=trimmed.split('|').map(c=>c.trim()).filter(c=>c);
      if(!cells.length)continue;

      const isHeader=cells.some(c=>['문제','정오답','개념','풀이','해석력','합계'].includes(c));
      if(isHeader&&!inTable){
        closeScoreGrid();
        html+=`<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>`;
        cells.forEach(c=>{html+=`<th style="background:var(--surface2);color:var(--text2);padding:9px 12px;text-align:center;border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap">${esc(c)}</th>`;});
        html+=`</tr></thead><tbody>`;
        inTable=true;
        continue;
      }

      if(inTable){
        const isAvg=cells[0]==='평균'||cells[0].includes('평균');
        html+=`<tr style="${isAvg?'background:var(--surface2);font-weight:700':''}">`;
        cells.forEach(c=>{
          const oxColor=c==='O'?'var(--green)':c==='X'?'var(--red)':'';
          html+=`<td style="padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);${oxColor?`color:${oxColor};font-weight:700`:''}">${esc(c)}</td>`;
        });
        html+=`</tr>`;
        continue;
      }
    }

    // 파이프 표 다음 일반 줄 → 표 닫기
    if(inTable){closeTable();}

    // 빈 줄
    if(!trimmed){html+=`<div style="height:6px"></div>`;continue;}

    // 일반 텍스트
    closeScoreGrid();
    html+=`<div style="font-size:13px;color:var(--text);line-height:1.8">${esc(trimmed)}</div>`;
  }

  closeCard();
  container.innerHTML=html||`<div class="prob-card"><div style="padding:16px 18px;font-size:13px;color:var(--text2)">결과가 없습니다.</div></div>`;
}

async function downloadPDF(){
  const btn=document.getElementById('pdfBtn');
  const rc=document.getElementById('resultContent');
  if(!lastRawText||!rc||!rc.children.length){alert('먼저 분석을 완료해주세요.');return;}
  btn.textContent='⏳ 생성 중...';btn.disabled=true;
  try{
    const{jsPDF}=window.jspdf;
    const d=new Date();
    const fname=`물리1_분석결과_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.pdf`;
    const today=d.toLocaleDateString('ko-KR');
    const SCALE=2;
    const PW=210,PH=297,MG=8,GAP=4;
    const cellW=(PW-MG*2-GAP)/2;
    const CELL_PX=Math.round(cellW*3.7795);

    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,200));

    const allCards=Array.from(rc.children);
    const probCards=allCards.filter(el=>el.classList.contains('prob-card'));
    const totalCards=allCards.filter(el=>el.classList.contains('total-card'));

    // 카드 캡처 (셀 너비 기준)
    const captureCard=async(cardEl)=>{
      const wrap=document.createElement('div');
      wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${CELL_PX}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
      const cl=cardEl.cloneNode(true);
      cl.style.cssText='width:100%;margin:0;border-radius:8px;box-shadow:none;box-sizing:border-box;';
      cl.querySelectorAll('*').forEach(el=>{el.style.maxHeight='none';el.style.overflow='visible';});
      wrap.appendChild(cl);
      document.body.appendChild(wrap);
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      await new Promise(r=>setTimeout(r,50));
      const canvas=await html2canvas(wrap,{
        scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,
        width:CELL_PX,windowWidth:CELL_PX,
      });
      document.body.removeChild(wrap);
      return canvas;
    };

    // canvas px → mm 변환 (CELL_PX px = cellW mm 이므로 비율로 계산)
    const canvasToMmH=(canvas)=>(canvas.height/canvas.width)*cellW;

    // 카드가 한 페이지를 넘으면 축소해서 맞춤
    const MAX_ROW_H=PH-MG*2-10; // 한 행 최대 높이

    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    let pageNum=1;
    let curY=MG;
    let isFirstPage=true;

    // 문제 카드 2개씩 행으로 처리 — 각 행 높이는 두 카드 중 큰 것에 맞춤
    for(let i=0;i<probCards.length;i+=2){
      const c1=await captureCard(probCards[i]);
      const c2=probCards[i+1]?await captureCard(probCards[i+1]):null;
      let h1=canvasToMmH(c1);
      let h2=c2?canvasToMmH(c2):0;
      let rowH=Math.max(h1,h2);

      // 행이 너무 크면 페이지 전체로 축소
      if(rowH>MAX_ROW_H){
        const ratio=MAX_ROW_H/rowH;
        h1*=ratio; h2*=ratio; rowH=MAX_ROW_H;
      }

      // 현재 위치에 안 들어가면 새 페이지로
      if(!isFirstPage&&curY+rowH>PH-MG-5){
        pdf.setFontSize(7);pdf.setTextColor(168,164,158);pdf.setFont('helvetica','normal');
        pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
        pdf.text(today,PW-MG,PH-3,{align:'right'});
        pdf.addPage();pageNum++;curY=MG;
      }
      isFirstPage=false;

      // 행 구분선 (첫 행 제외)
      if(curY>MG+1){
        pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);
        pdf.line(MG,curY-GAP/2,PW-MG,curY-GAP/2);
      }
      // 세로 중앙 구분선
      pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);
      pdf.line(MG+cellW+GAP/2,curY,MG+cellW+GAP/2,curY+rowH);

      pdf.addImage(c1.toDataURL('image/jpeg',0.93),'JPEG',MG,curY,cellW,h1);
      if(c2)pdf.addImage(c2.toDataURL('image/jpeg',0.93),'JPEG',MG+cellW+GAP,curY,cellW,h2);
      curY+=rowH+GAP;
    }

    // 마지막 페이지 번호
    pdf.setFontSize(7);pdf.setTextColor(168,164,158);pdf.setFont('helvetica','normal');
    pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
    pdf.text(today,PW-MG,PH-3,{align:'right'});

    // 총평 (별도 페이지)
    if(totalCards.length>0){
      pdf.addPage();pageNum++;
      const FULL_PX=Math.round((PW-MG*2)*3.7795);
      let ty=MG;
      for(const card of totalCards){
        const wrap=document.createElement('div');
        wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${FULL_PX}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
        const cl=card.cloneNode(true);
        cl.style.cssText='width:100%;margin:0;border-radius:8px;box-shadow:none;';
        cl.querySelectorAll('*').forEach(el=>{el.style.maxHeight='none';el.style.overflow='visible';});
        wrap.appendChild(cl);
        document.body.appendChild(wrap);
        await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
        await new Promise(r=>setTimeout(r,50));
        const canvas=await html2canvas(wrap,{scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,width:FULL_PX,windowWidth:FULL_PX});
        document.body.removeChild(wrap);
        const fw=PW-MG*2,fh=canvas.height/canvas.width*fw;
        if(ty+fh>PH-MG){pdf.addPage();pageNum++;ty=MG;}
        pdf.addImage(canvas.toDataURL('image/jpeg',0.93),'JPEG',MG,ty,fw,fh);
        ty+=fh+GAP;
      }
      pdf.setFontSize(7);pdf.setTextColor(168,164,158);
      pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
      pdf.text(today,PW-MG,PH-3,{align:'right'});
    }

    pdf.save(fname);
  }catch(e){
    alert('PDF 생성 오류: '+e.message);console.error(e);
  }finally{
    btn.textContent='⬇ PDF 저장';btn.disabled=false;
  }
}
function initBulkCountBtns(){
  const wrap=document.getElementById('bulk-count-btns');
  if(!wrap)return;
  wrap.innerHTML='';
  for(let i=1;i<=10;i++){
    const btn=document.createElement('button');
    btn.id=`bulk_count_${i}`;
    btn.textContent=i;
    btn.style.cssText='width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;';
    btn.onclick=(function(n,b){return function(){setBulkCount(n,b);};})(i,btn);
    wrap.appendChild(btn);
  }
}

initBulkCountBtns();
