<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물리1 풀이 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;
  --accent:#2563eb;--accent-light:#dbeafe;
  --green:#16a34a;--red:#dc2626;--red-light:#fee2e2;--yellow:#d97706;
  --text:#1a1917;--text2:#6b6860;--text3:#a8a49e;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:14px;line-height:1.7;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text3);}
.api-wrap{display:flex;align-items:center;gap:8px;}
.api-label{font-size:11px;color:var(--text2);white-space:nowrap;}
.api-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;outline:none;width:200px;transition:border-color .15s;}
.api-input:focus{border-color:var(--accent);}
.container{max-width:900px;margin:0 auto;padding:24px 16px 120px;}
.bulk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.bulk-grid{grid-template-columns:1fr;}.api-input{width:130px;}.header-sub{display:none;}}
.bulk-zone{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.bulk-zone-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.bulk-zone-title{font-size:12px;font-weight:700;color:var(--text2);}
.bulk-drop-area{padding:20px 14px;text-align:center;cursor:pointer;transition:background .12s;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.bulk-drop-area:hover{background:var(--accent-light);}
.bulk-drop-icon{font-size:26px;}
.bulk-drop-text{font-size:12px;color:var(--text2);}
.bulk-drop-sub{font-size:11px;color:var(--text3);}
.bulk-file-input{display:none;}
.bulk-preview-grid{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;}
.bulk-img-wrap{position:relative;display:inline-block;}
.bulk-img{width:76px;height:76px;object-fit:cover;border-radius:7px;border:1px solid var(--border);display:block;cursor:pointer;transition:transform .1s;}
.bulk-img:hover{transform:scale(1.05);}
.bulk-img-remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bulk-img-name{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bulk-add-btn{width:76px;height:76px;border:2px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:var(--text3);background:transparent;transition:all .12s;}
.bulk-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.bulk-text-area{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;line-height:1.7;padding:10px 14px;resize:vertical;min-height:60px;outline:none;}
.bulk-text-area::placeholder{color:var(--text3);}
.img-badge{background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'JetBrains Mono',monospace;}
textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.7;padding:12px 14px;resize:vertical;min-height:80px;outline:none;}
textarea::placeholder{color:var(--text3);}
.range-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);resize:none;outline:none;min-height:48px;}
.range-input::placeholder{color:var(--text3);}
.analyze-wrap{position:fixed;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;justify-content:center;z-index:100;}
.analyze-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px 40px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:480px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(37,99,235,.35);}
.analyze-btn:hover{background:#1d4ed8;transform:translateY(-1px);}
.analyze-btn:active{transform:scale(.98);}
.result-section{display:none;}
.result-section.visible{display:block;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.result-title{font-size:16px;font-weight:700;}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .12s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.prob-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);}
.prob-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:20px;box-shadow:var(--shadow);}
.summary-card-header{padding:14px 18px;background:var(--text);color:#fff;font-size:13px;font-weight:700;}
.total-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-top:14px;overflow:hidden;box-shadow:var(--shadow);}
.total-card-header{padding:14px 18px;background:var(--text);color:#fff;font-size:13px;font-weight:700;}
.stream-text{color:var(--text);font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:keep-all;padding:16px 18px;}
.loading-wrap{padding:48px 16px;text-align:center;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--text2);font-size:13px;}
.error-box{background:var(--red-light);border:1px solid #fca5a5;border-radius:10px;padding:14px 16px;color:var(--red);font-size:13px;margin-bottom:14px;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;}
.lightbox-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <div>
      <div class="header-title">물리1 풀이 분석기</div>
      <div class="header-sub">Gemini AI 기반 역량 피드백</div>
    </div>
  </div>
  <div class="api-wrap">
    <button id="mockToggle" onclick="toggleMock()" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:600;">🧪 목업 모드 OFF</button>
    <span class="api-label">🔑 API Key</span>
    <input class="api-input" type="password" id="apiKey" placeholder="AIza... (Google AI Studio)"/>
  </div>
</div>

<div id="mockBanner" style="display:none;background:#fef3c7;border-bottom:1px solid #fde68a;padding:8px 20px;text-align:center;font-size:12px;color:#92400e;font-weight:600;">
  🧪 목업 모드 활성화 — API를 호출하지 않고 샘플 결과를 보여줍니다
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="container">
  <div id="inputView">
    <div id="modeB">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:14px;box-shadow:var(--shadow);">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;">분석할 문제 범위 (선택)</div>
        <textarea class="range-input" id="bulk-range" placeholder="예: 5번~9번 문제입니다 / 사진에서 모든 문제를 자동으로 찾아 분석"></textarea>
      </div>

      <!-- 학생 정답 입력 -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:12px;font-weight:700;color:var(--text2)">✅ 학생 선택 정답 입력</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--text3)">문제 수</span>
            <div style="display:flex;gap:4px;" id="bulk-count-btns"></div>
          </div>
        </div>
        <div id="bulk-answer-grid" style="display:flex;flex-direction:column;gap:6px;"></div>
      </div>

      <div class="bulk-grid">
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">📝 문제 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-q" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-q"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 / PDF 추가</span><span class="bulk-drop-sub">한 장에 여러 문제 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-q" accept="image/*,application/pdf" multiple onchange="bulkUpload('q',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-q"></div>
          <textarea class="bulk-text-area" id="bulk-text-q" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">✅ 정답·해설 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-a" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-a"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 / PDF 추가</span><span class="bulk-drop-sub">한 장에 여러 정답 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-a" accept="image/*,application/pdf" multiple onchange="bulkUpload('a',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-a"></div>
          <textarea class="bulk-text-area" id="bulk-text-a" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
        <div class="bulk-zone">
          <div class="bulk-zone-header"><span class="bulk-zone-title">✏️ 학생 풀이 사진 / 텍스트</span><span class="img-badge" id="bulk-badge-s" style="display:none"></span></div>
          <label class="bulk-drop-area" for="bulk-file-s"><span class="bulk-drop-icon">📷</span><span class="bulk-drop-text">사진 / PDF 추가</span><span class="bulk-drop-sub">한 장에 여러 풀이 OK</span></label>
          <input class="bulk-file-input" type="file" id="bulk-file-s" accept="image/*,application/pdf" multiple onchange="bulkUpload('s',this)"/>
          <div class="bulk-preview-grid" id="bulk-preview-s"></div>
          <textarea class="bulk-text-area" id="bulk-text-s" placeholder="텍스트로 입력하거나 사진과 함께 사용 가능"></textarea>
        </div>
      </div>
    </div>
    <div style="height:80px"></div>
  </div>

  <div id="resultView" class="result-section">
    <div class="result-header">
      <div class="result-title">📊 분석 결과</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="back-btn" id="pdfBtn" onclick="downloadPDF()" style="background:var(--accent);color:#fff;border-color:var(--accent)">⬇ PDF 저장</button>
        <button class="back-btn" onclick="goBack()">← 다시 입력</button>
      </div>
    </div>
    <div id="resultContent"></div>
    <div style="height:80px"></div>
  </div>
</div>

<div class="analyze-wrap" id="analyzeWrap">
  <button class="analyze-btn" onclick="analyze()">⚡ AI 분석 시작</button>
</div>

<script>
let currentMode='B', isMock=false;
let isAnalyzing=false;
const bulkStore={q:[],a:[],s:[]};
let bulkProblemCount=0;
const bulkStudentAnswers={};
const bulkCorrectAnswers={};

const FILE_LIMITS={
  maxFilesPerBucket:6,
  maxTotalFiles:12,
  maxTotalBytes:18*1024*1024,
  maxSinglePdfBytes:10*1024*1024,
  maxSingleImageBytes:8*1024*1024,
  maxImageDimension:2200,
  minImageDimension:1400,
  jpegQuality:.95
};
const MODEL_CONFIG={
  extract:['gemini-2.5-flash','gemini-2.0-flash'],
  analysis:['gemini-2.5-flash-lite','gemini-2.0-flash']
};

function getAllStoredFiles(){return [...bulkStore.q,...bulkStore.a,...bulkStore.s];}
function estimateBase64Bytes(base64){return Math.ceil((base64?.length||0)*0.75);}
function getApproxStoredBytes(){return getAllStoredFiles().reduce((sum,file)=>sum+(file.bytes||estimateBase64Bytes(file.base64)),0);}
function getStoredFileCount(){return getAllStoredFiles().length;}
function getFileFingerprint(file){return [file.name,file.size,file.lastModified,file.type||''].join('__');}
function hasDuplicateInBucket(key,fingerprint){return bulkStore[key].some(file=>file.fingerprint===fingerprint);}
function getTargetProblemNumbers(){
  const set=new Set();
  Object.keys(bulkCorrectAnswers).forEach(n=>set.add(parseInt(n,10)));
  Object.keys(bulkStudentAnswers).forEach(n=>set.add(parseInt(n,10)));
  if(set.size===0&&bulkProblemCount>0){for(let i=1;i<=bulkProblemCount;i++)set.add(i);}
  return [...set].filter(n=>Number.isFinite(n)&&n>0).sort((a,b)=>a-b);
}
function makeRangeLabel(){
  const raw=document.getElementById('bulk-range')?.value?.trim()||'';
  if(raw) return raw;
  const targets=getTargetProblemNumbers();
  if(targets.length===1) return `${targets[0]}번`;
  if(targets.length>1) return `${targets[0]}번~${targets[targets.length-1]}번`;
  return '업로드된 모든 문제';
}
function resetAnalyzeButton(btn){
  if(!btn)return;
  btn.disabled=false;
  btn.style.opacity='1';
  btn.style.cursor='pointer';
  btn.textContent='⚡ AI 분석 시작';
}
function setAnalyzeButtonLoading(btn){
  if(!btn)return;
  btn.disabled=true;
  btn.style.opacity='.65';
  btn.style.cursor='not-allowed';
  btn.textContent='⏳ 분석 중...';
}
async function fileToDataURL(file){
  return await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(String(e.target.result||''));
    reader.onerror=()=>reject(new Error('파일을 읽지 못했습니다.'));
    reader.readAsDataURL(file);
  });
}
async function loadImageElement(blob){
  const url=URL.createObjectURL(blob);
  try{
    const img=await new Promise((resolve,reject)=>{
      const el=new Image();
      el.onload=()=>resolve(el);
      el.onerror=()=>reject(new Error('이미지를 열지 못했습니다.'));
      el.src=url;
    });
    return img;
  }finally{
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
}
function enhanceImageData(ctx,width,height){
  const imageData=ctx.getImageData(0,0,width,height);
  const data=imageData.data;
  const hist=new Uint32Array(256);
  for(let i=0;i<data.length;i+=4){
    const gray=Math.round(data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114);
    hist[gray]++;
  }
  const total=width*height;
  const lowCut=Math.floor(total*0.01);
  const highCut=Math.floor(total*0.99);
  let cum=0,low=0,high=255;
  for(let i=0;i<256;i++){cum+=hist[i]; if(cum>=lowCut){low=i;break;}}
  cum=0;
  for(let i=0;i<256;i++){cum+=hist[i]; if(cum>=highCut){high=i;break;}}
  const span=Math.max(30,high-low);
  for(let i=0;i<data.length;i+=4){
    let gray=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
    gray=(gray-low)*255/span;
    gray=Math.max(0,Math.min(255,gray));
    gray=((gray-128)*1.12)+128;
    gray=Math.max(0,Math.min(255,gray));
    data[i]=data[i+1]=data[i+2]=gray;
  }
  ctx.putImageData(imageData,0,0);
}
async function optimizeImageFile(file){
  try{
    const img=await loadImageElement(file);
    const naturalW=img.naturalWidth||img.width||1;
    const naturalH=img.naturalHeight||img.height||1;
    const maxDim=Math.max(naturalW,naturalH);
    const scale=Math.min(FILE_LIMITS.maxImageDimension/maxDim, Math.max(FILE_LIMITS.minImageDimension/maxDim,1));
    const width=Math.max(1,Math.round(naturalW*scale));
    const height=Math.max(1,Math.round(naturalH*scale));
    const canvas=document.createElement('canvas');
    canvas.width=width;
    canvas.height=height;
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,width,height);
    ctx.drawImage(img,0,0,width,height);
    enhanceImageData(ctx,width,height);
    const dataUrl=canvas.toDataURL('image/jpeg',FILE_LIMITS.jpegQuality);
    const base64=dataUrl.split(',')[1];
    return {
      name:file.name,
      base64,
      previewSrc:dataUrl,
      mediaType:'image/jpeg',
      isPdf:false,
      bytes:estimateBase64Bytes(base64),
      fingerprint:getFileFingerprint(file),
      sourceSize:file.size,
      optimized:true
    };
  }catch{
    const dataUrl=await fileToDataURL(file);
    const base64=dataUrl.split(',')[1];
    const mediaType=file.type||'image/jpeg';
    return {
      name:file.name,
      base64,
      previewSrc:dataUrl,
      mediaType,
      isPdf:false,
      bytes:file.size||estimateBase64Bytes(base64),
      fingerprint:getFileFingerprint(file),
      sourceSize:file.size,
      optimized:false
    };
  }
}
async function normalizeUploadFile(file){
  const isPdf=file.type==='application/pdf' || /\.pdf$/i.test(file.name||'');
  if(isPdf){
    const dataUrl=await fileToDataURL(file);
    const base64=dataUrl.split(',')[1];
    return {
      name:file.name,
      base64,
      previewSrc:'',
      mediaType:'application/pdf',
      isPdf:true,
      bytes:file.size||estimateBase64Bytes(base64),
      fingerprint:getFileFingerprint(file),
      sourceSize:file.size,
      optimized:false
    };
  }
  return optimizeImageFile(file);
}
function validateIncomingFiles(key,files){
  const accepted=[];
  const errors=[];
  const currentCount=bulkStore[key].length;
  if(currentCount+files.length>FILE_LIMITS.maxFilesPerBucket){
    errors.push(`한 칸에는 최대 ${FILE_LIMITS.maxFilesPerBucket}개까지만 올릴 수 있습니다.`);
  }
  for(const file of files){
    const isPdf=file.type==='application/pdf' || /\.pdf$/i.test(file.name||'');
    const isImage=(file.type||'').startsWith('image/');
    if(!isPdf&&!isImage){
      errors.push(`${file.name}: JPG/PNG/PDF만 업로드할 수 있습니다.`);
      continue;
    }
    if(isPdf&&file.size>FILE_LIMITS.maxSinglePdfBytes){
      errors.push(`${file.name}: PDF는 10MB 이하로 나눠주세요.`);
      continue;
    }
    if(!isPdf&&file.size>FILE_LIMITS.maxSingleImageBytes){
      errors.push(`${file.name}: 이미지는 8MB 이하로 줄여주세요.`);
      continue;
    }
    if(hasDuplicateInBucket(key,getFileFingerprint(file))){
      errors.push(`${file.name}: 같은 칸에 이미 추가된 파일입니다.`);
      continue;
    }
    accepted.push(file);
  }
  return {accepted,errors};
}

async function bulkUpload(key,input){
  const files=Array.from(input.files||[]);
  input.value='';
  if(!files.length)return;

  const {accepted,errors}=validateIncomingFiles(key,files);
  if(errors.length)alert(errors.join('\n'));
  if(!accepted.length)return;

  for(const file of accepted){
    try{
      const normalized=await normalizeUploadFile(file);
      const projectedCount=getStoredFileCount()+1;
      const projectedBytes=getApproxStoredBytes()+(normalized.bytes||0);
      if(projectedCount>FILE_LIMITS.maxTotalFiles){
        alert(`전체 첨부는 최대 ${FILE_LIMITS.maxTotalFiles}개까지만 허용됩니다.`);
        break;
      }
      if(projectedBytes>FILE_LIMITS.maxTotalBytes){
        alert('전체 첨부 용량이 너무 큽니다. PDF를 나누거나 사진 수를 줄여주세요.');
        break;
      }
      bulkStore[key].push(normalized);
      renderBulkPreviews(key);
    }catch(e){
      alert(`${file.name} 업로드 실패: ${e.message}`);
    }
  }
}

  const ANALYSIS_SYSTEM=`물리1 교사. 학생 풀이 분석·피드백 작성.

최우선 원칙:
- [해설 원문 - 절대 기준] 블록만이 ▶ 1. 정답과 ▶ 3. 문제 풀이법의 유일한 근거다.

- 누락 없이 각 문제마다 반드시 1개의 피드백 블록을 출력한다.
- 형식(▶ =====) 변경 금지. LaTeX 금지. 인사말 금지.`;

  const ANALYSIS_RETRY_SYSTEM=`물리1 교사. 누락 복구 우선 모드.

반드시 지킬 것:
- [해설 원문 - 절대 기준]의 모든 문제번호를 하나도 빠뜨리지 말고 출력한다.
- ▶ 1과 ▶ 3은 해설 원문을 그대로 사용한다.
- 이미 출력한 문제를 다시 쓰지 말고 누락된 문제도 포함한 완전한 최종본을 다시 출력한다.
- 형식은 기존과 동일한 최종본 전체를 다시 출력한다.`;

  const FMT_PROBLEM=`
=====
문제N 피드백
=====
▶ 1. 정답
①
▶ 2. 정오답 판단

▶ 3. 문제 풀이법

- 해설 기준 평가:

- 문제 해석력: X점 / 10점 | 이유:

  const FMT_TOTAL=`
=====
총평
=====
▶ 전체 점수표
| 문제 | 정오답 | 개념 이해도 | 풀이 전개력 | 문제 해석력 | 합계 |
|------|--------|-----------|-----------|-----------|------|
| 1번 | O | 10/10 | 8/10 | 9/10 | 27/30 |

  const setMsg=(msg)=>{const el=document.getElementById('loadingMsg');if(el)el.innerHTML=msg;};

  const fetchWithTimeout=async(url,options,timeoutMs=180000)=>{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
    try{
      return await fetch(url,{...options,signal:ctrl.signal});
    }catch(e){
      if(e.name==='AbortError')throw new Error('요청 시간 초과. PDF를 더 잘게 나누거나 JPG를 1~2장씩 나눠 다시 시도해주세요.');
      throw e;
    }finally{
      clearTimeout(timer);
    }
  };

  const parseProxyError=(raw,fallback='API 오류')=>{
    let errMsg=fallback;
    let retryAfter=20;
    let meta={};
    try{
      const j=JSON.parse(raw);
      errMsg=j.error?.message||fallback;
      if(j.retryAfter)retryAfter=j.retryAfter;
      meta=j.meta||{};
    }catch{
      const m=String(raw||'').match(/retry in ([\d.]+)s/i);
      if(m)retryAfter=Math.ceil(parseFloat(m[1]))+2;
      errMsg=String(raw||fallback).slice(0,300);
    }
    return {errMsg,retryAfter,meta};
  };

  const isTransientModelBusy=(status,msg='')=>{
    const t=String(msg||'').toLowerCase();
    return [429,500,502,503,504].includes(status)||t.includes('high demand')||t.includes('temporarily unavailable')||t.includes('resource exhausted')||t.includes('overloaded')||t.includes('try again later');
  };

  const normalizeModelList=(modelOrList,fallbackList=[])=>{
    const arr=[].concat(modelOrList||[]).concat(fallbackList||[]).filter(Boolean);
    return [...new Set(arr)];
  };

  const callText=async(system,parts,{attempt=0,model=MODEL_CONFIG.extract}={})=>{
    const models=normalizeModelList(model);
    const primaryModel=models[0];
    const fallbackModels=models.slice(1);
    let res;
    try{
      res=await fetchWithTimeout('/api/proxy',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({apiKey,stream:false,system,model:primaryModel,fallbackModels,messages:[{role:'user',content:parts}]})
      },240000);
    }catch(e){throw new Error(e.message);}

    const raw=await res.text();
    if(!res.ok){
      const {errMsg,retryAfter}=parseProxyError(raw);
      if(isTransientModelBusy(res.status,errMsg)&&attempt<1){
        setMsg(`⏳ 모델 혼잡으로 잠시 대기 중...<br><small style="color:var(--text3)">${retryAfter}초 후 대체 모델 포함 1회만 재시도합니다.</small>`);
        await new Promise(r=>setTimeout(r,Math.min(retryAfter,20)*1000));
        return callText(system,parts,{attempt:attempt+1,model:models});
      }
      throw new Error(errMsg);
    }
    try{
      const data=JSON.parse(raw);
      return data.content?.map(c=>c.text||'').join('').trim()||'';
    }catch{
      return raw.trim();
    }
  };

  const streamCall=async(system,parts,onChunk,{attempt=0,model=MODEL_CONFIG.analysis}={})=>{
    const models=normalizeModelList(model);
    const primaryModel=models[0];
    const fallbackModels=models.slice(1);
    let res;
    try{
      res=await fetchWithTimeout('/api/proxy',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({apiKey,system,model:primaryModel,fallbackModels,messages:[{role:'user',content:parts}]})
      },240000);
    }catch(e){throw new Error(e.message);}

    if(!res.ok){
      const errText=await res.text();
      const {errMsg,retryAfter}=parseProxyError(errText);
      if(isTransientModelBusy(res.status,errMsg)&&attempt<1){
        setMsg(`⏳ 모델 혼잡으로 잠시 대기 중...<br><small style="color:var(--text3)">${retryAfter}초 후 대체 모델 포함 1회만 재시도합니다.</small>`);
        await new Promise(r=>setTimeout(r,Math.min(retryAfter,20)*1000));
        return streamCall(system,parts,onChunk,{attempt:attempt+1,model:models});
      }
      throw new Error(errMsg);
    }

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    try{
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        buf+=decoder.decode(value,{stream:true});
        const events=buf.split('\n\n');
        buf=events.pop()||'';
        for(const eventBlock of events){
          const lines=eventBlock.split('\n').map(line=>line.trim()).filter(Boolean);
          for(const line of lines){
            if(!line.startsWith('data:'))continue;
            const d=line.slice(5).trim();
            if(!d||d==='[DONE]')continue;
            const j=JSON.parse(d);
            if(j.type==='content_block_delta'&&j.delta?.text)onChunk(j.delta.text);
            if(j.type==='error'&&j.error?.message)throw new Error(j.error.message);
          }
        }
      }
    }finally{
      try{await reader.cancel();}catch{}
    }
  };

  const buildExplanationExtractParts=(missingNums=[])=>{
    const parts=[];
    const missingHint=missingNums.length?`누락 의심 문제: ${missingNums.map(n=>`${n}번`).join(', ')}`:'';
    parts.push({type:'text',text:`${rangeLabel} 해설 자료에서 문제별 정답과 풀이원문만 추출하세요. ${missingHint}`.trim()});
    if(aT)parts.push({type:'text',text:`[해설 텍스트 원본]\n${aT}`});
    bulkStore.a.forEach((file,ii)=>{
      parts.push({type:'text',text:`[해설 자료 ${ii+1}] ${file.isPdf?'PDF':'JPG 이미지'}${file.optimized?' (OCR 보정본)':''}`});
      if(file.isPdf)parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:file.base64}});
      else parts.push({type:'image',source:{type:'base64',media_type:file.mediaType,data:file.base64}});
    });
    return parts;
  };

  const parseExtractedSolutions=(raw)=>{
    const map={};
    const re=/\[문제번호\]\s*(\d+)\s*\n([\s\S]*?)\[\/문제번호\]/g;
    let m;
    while((m=re.exec(raw))){
      const num=m[1];
      const body=m[2].trim();
      const ans=(body.match(/정답\s*:\s*([①②③④⑤])/)||[])[1]||'';
      let sol='';
      const sm=body.match(/풀이원문\s*:\s*\n?([\s\S]*)$/);
      if(sm)sol=sm[1].trim();
      if(ans||sol)map[num]={answer:ans,solution:sol};
    }
    return map;
  };

  const buildAnalysisParts=(extractedRaw)=>{
    const parts=[];
    const answerEntries=Object.entries(bulkStudentAnswers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    const correctEntries=Object.entries(bulkCorrectAnswers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));

    parts.push({type:'text',text:`다음 자료를 이용해 ${rangeLabel}를 분석하세요.\n\n출력 형식:\n${FMT_PROBLEM.replace(/문제N/g,'문제N(번호)')}\n\n마지막 총평 형식:\n${FMT_TOTAL}`});
    parts.push({type:'text',text:`[해설 원문 - 절대 기준]\n${extractedRaw}`});

    if(correctEntries.length)parts.push({type:'text',text:'[정답 입력]\n'+correctEntries.map(([n,v])=>`${n}번: ${v}`).join('\n')});
    if(answerEntries.length)parts.push({type:'text',text:'[학생 선택 입력]\n'+answerEntries.map(([n,v])=>`${n}번: ${v}`).join('\n')});
    if(qT)parts.push({type:'text',text:`[문제 텍스트]\n${qT}`});
    bulkStore.q.forEach((file,ii)=>{
      parts.push({type:'text',text:`[문제 자료 ${ii+1}] ${file.isPdf?'PDF':'JPG 이미지'}${file.optimized?' (OCR 보정본)':''}`});
      if(file.isPdf)parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:file.base64}});
      else parts.push({type:'image',source:{type:'base64',media_type:file.mediaType,data:file.base64}});
    });

    if(sT)parts.push({type:'text',text:`[학생 풀이 텍스트]\n${sT}`});
    bulkStore.s.forEach((file,ii)=>{
      parts.push({type:'text',text:`[학생 풀이 자료 ${ii+1}] ${file.isPdf?'PDF':'JPG 이미지'}${file.optimized?' (OCR 보정본)':''}`});
      if(file.isPdf)parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:file.base64}});
      else parts.push({type:'image',source:{type:'base64',media_type:file.mediaType,data:file.base64}});
    });
    return parts;
  };

  const escapeReg=(s)=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  const mergeExtractedSolutions=(analysisText,solutionMap)=>{
    let out=analysisText;
    Object.entries(solutionMap).forEach(([num,data])=>{
      const titleRe=new RegExp(`(=====\\n문제\\s*${escapeReg(num)}\\s*피드백\\n=====\\n)([\\s\\S]*?)(?=\\n=====\\n문제|\\n=====\\n총평|$)`);
      const mm=out.match(titleRe);
      if(!mm)return;
      let body=mm[2];
      if(data.answer)body=body.replace(/(▶\s*1\.\s*정답\s*\n)([\s\S]*?)(?=\n▶\s*2\.)/, `$1${data.answer}\n`);
      if(data.solution){
        const normalized=data.solution.replace(/\n{3,}/g,'\n\n').trim();
        body=body.replace(/(▶\s*3\.\s*문제 풀이법\s*\n)([\s\S]*?)(?=\n▶\s*4\.)/, `$1${normalized}\n`);
      }
      out=out.replace(titleRe, `$1${body}`);
    });
    return out;
  };

  try{
    const targets=getTargetProblemNumbers();

    setMsg('1/2 해설 원문을 고정 추출 중입니다...');
    let extractedRaw=await callText(EXTRACT_SYSTEM,buildExplanationExtractParts(),{model:MODEL_CONFIG.extract});
    let solutionMap=parseExtractedSolutions(extractedRaw);

    if(targets.length){
      const missing=missingProblemNumbers(Object.keys(solutionMap).map(n=>parseInt(n,10)),targets);
      if(missing.length){
        setMsg(`1/2 해설 원문 누락 보정 중입니다...<br><small style="color:var(--text3)">${buildCoverageWarning(missing,'해설 추출')}</small>`);
        const retryRaw=await callText(EXTRACT_RETRY_SYSTEM,buildExplanationExtractParts(missing),{model:MODEL_CONFIG.extract});
        const retryMap=parseExtractedSolutions(retryRaw);
        solutionMap={...solutionMap,...retryMap};
        extractedRaw=Object.entries(solutionMap).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([num,data])=>`[문제번호] ${num}\n정답: ${data.answer||'(불명확)'}\n풀이원문:\n${(data.solution||'(불명확)').trim()}\n[/문제번호]`).join('\n\n');
      }
    }

    if(!Object.keys(solutionMap).length)throw new Error('해설 원문 추출에 실패했습니다. 해설 이미지/PDF의 해상도나 배치를 확인해주세요.');
    if(targets.length){
      const stillMissing=missingProblemNumbers(Object.keys(solutionMap).map(n=>parseInt(n,10)),targets);
      if(stillMissing.length)throw new Error(`해설 원문 추출이 불완전합니다. ${buildCoverageWarning(stillMissing,'해설 추출')}`);
    }

    setMsg('2/2 추출된 해설 원문 기준으로 학생 풀이를 분석 중입니다...');
    rc.innerHTML='';
    let fullText='';
    const sc=document.createElement('div');
    sc.className='prob-card';
    sc.innerHTML=`<div style="padding:16px 18px"><div class="stream-text" id="streamText"></div></div>`;
    rc.appendChild(sc);
    const streamEl=document.getElementById('streamText');

    const runAnalysisOnce=async(system)=>{
      fullText='';
      streamEl.textContent='';
      await streamCall(system,buildAnalysisParts(extractedRaw),chunk=>{fullText+=chunk;streamEl.textContent=fullText;},{model:MODEL_CONFIG.analysis});
      return fullText;
    };

    let analysisText=await runAnalysisOnce(ANALYSIS_SYSTEM);
    if(!analysisText.trim())throw new Error('분석 결과가 없습니다. 업로드 파일 또는 API 응답을 확인해주세요.');

    if(targets.length){
      const found=extractProblemNumbersFromResult(analysisText);
      const missing=missingProblemNumbers(found,targets);
      if(missing.length){
        setMsg(`2/2 분석 결과 누락 보정 중입니다...<br><small style="color:var(--text3)">${buildCoverageWarning(missing,'분석 결과')}</small>`);
        analysisText=await runAnalysisOnce(`${ANALYSIS_SYSTEM}\n\n${ANALYSIS_RETRY_SYSTEM}`);
      }
    }

    rc.innerHTML='';
    if(!analysisText.trim())throw new Error('분석 결과가 없습니다. 업로드 파일 또는 API 응답을 확인해주세요.');
    if(targets.length){
      const finalFound=extractProblemNumbersFromResult(analysisText);
      const finalMissing=missingProblemNumbers(finalFound,targets);
      if(finalMissing.length)throw new Error(`분석 결과가 불완전합니다. ${buildCoverageWarning(finalMissing,'분석 결과')}`);
    }

    const mergedText=mergeExtractedSolutions(analysisText,solutionMap);
    renderResult(mergedText,rc);
  }catch(e){
    rc.innerHTML=`<div class="error-box">⚠️ 오류: ${e.message}<br><small>정확도 우선 모드에서는 해설 원문과 문제 번호의 무결성을 먼저 검사합니다. JPG는 선명하게, PDF는 문제 단위로 나누면 정확도가 더 올라갑니다.</small></div><button class="back-btn" onclick="goBack()" style="margin-top:8px">← 다시 시도</button>`;
  }finally{
    const lw=rc.querySelector('.loading-wrap');
    if(lw)lw.remove();
    isAnalyzing=false;
    resetAnalyzeButton(analyzeBtn);
  }
}

let lastRawText='';

// 물리1 OCR 오인식 교정
function correctPhysicsText(text){
  const corrections=[
    [/출퇴/g,'출제'],[/질감/g,'질량'],[/무계\b/g,'무게'],[/속도\b/g,'속력'],
    [/떨어지지\s*않다/g,'떨어지지 않다'],[/떨어지지않다/g,'떨어지지 않다'],
    [/떨어지지\s*않는/g,'떨어지지 않는'],[/막돼/g,'막대'],
    [/수직\s*횡력/g,'수직항력'],[/수직횡력/g,'수직항력'],
    [/관성\s*의\s*법착/g,'관성의 법칙'],[/작용\s*반작용/g,'작용 반작용'],
    [/운동\s*에네지/g,'운동 에너지'],[/운동에네지/g,'운동 에너지'],
    [/퍼텐\s*셜/g,'퍼텐셜'],[/역학적\s*에네지/g,'역학적 에너지'],
    [/마철/g,'마찰'],[/마찰력\s*계수/g,'마찰 계수'],[/충격\s*량/g,'충격량'],
    [/운동\s*량/g,'운동량'],[/돌림\s*힘/g,'돌림힘'],[/도르\s*래/g,'도르래'],
    [/탄성\s*력/g,'탄성력'],[/합력\s*/g,'합력'],[/알짜\s*힘/g,'알짜힘'],
  ];
  let result=text;
  corrections.forEach(([pat,rep])=>{result=result.replace(pat,rep);});
  return result;
}

function renderResult(text,container){
  lastRawText=text;
  const corrected=correctPhysicsText(text);
  container.innerHTML='';

  // Gemini가 ===== 앞에 불필요한 텍스트를 붙이는 경우 제거
  // 첫 번째 ===== 이전 텍스트를 버림
  const firstSep = corrected.indexOf('=====');
  const cleanText = firstSep > 0 ? corrected.slice(firstSep) : corrected;

  const lines=cleanText.split('\n');
  let html='',inCard=false,inScoreGrid=false,inTable=false;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 열린 요소 닫기
  const closeScoreGrid=()=>{if(inScoreGrid){html+=`</div>`;inScoreGrid=false;}};
  const closeTable=()=>{if(inTable){html+=`</tbody></table></div>`;inTable=false;}};
  const closeCard=()=>{closeScoreGrid();closeTable();if(inCard){html+=`</div></div>`;inCard=false;}};

  const openCard=(title,isSummary)=>{
    closeCard();
    html+=`<div class="${isSummary?'total-card':'prob-card'}" style="margin-bottom:14px">`;
    html+=`<div class="${isSummary?'total-card-header':'prob-card-header'}" style="padding:14px 18px;font-size:13px;font-weight:700">${esc(title)}</div>`;
    html+=`<div style="padding:16px 18px">`;
    inCard=true;
  };

  for(let i=0;i<lines.length;i++){
    const trimmed=lines[i].trim();

    // ===== 구분선 → 새 카드
    if(/^={4,}/.test(trimmed)){
      const next=(lines[i+1]||'').trim();
      if(next&&!/^={4,}/.test(next)){
        i++;
        openCard(next,next.includes('총평'));
        if((lines[i+1]||'').trim().startsWith('='))i++;
      }
      continue;
    }

    // 카드가 없으면 자동 생성
    if(!inCard){html+=`<div class="prob-card" style="margin-bottom:14px"><div style="padding:16px 18px">`;inCard=true;}

    // ▶ 항목 제목
    if(/^▶/.test(trimmed)){
      closeScoreGrid();closeTable();
      html+=`<div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;display:flex;align-items:center;gap:6px"><span style="width:3px;height:12px;background:var(--accent);border-radius:2px;display:inline-block;flex-shrink:0"></span>${esc(trimmed.replace(/^▶\s*/,''))}</div>`;
      continue;
    }

    // 풀이 단계
    if(/^\d+단계[:\s]/.test(trimmed)){
      const nm=trimmed.match(/^(\d+)단계[:\s]+(.*)/);
      if(nm){
        html+=`<div style="display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border-radius:7px;padding:8px 12px;margin-bottom:6px"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);min-width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 3px">${nm[1]}</span><span style="font-size:13px;color:var(--text);line-height:1.6">${esc(nm[2])}</span></div>`;
        continue;
      }
    }

    // - 항목들
    if(/^-\s+/.test(trimmed)){
      const scoreM=trimmed.match(/^-\s+(개념 이해도|풀이 전개력|문제 해석력):\s*(\d+)점\s*\/\s*10점(?:\s*\|\s*이유:\s*(.*))?/);
      const totalM=trimmed.match(/^-\s+합계:\s*(\d+)점\s*\/\s*30점/);

      if(scoreM){
        const label=scoreM[1],score=parseInt(scoreM[2]),reason=scoreM[3]||'';
        const isPerfect=score===10;
        const col=isPerfect?'var(--green)':score>=8?'var(--accent)':score>=6?'var(--yellow)':'var(--red)';
        // 첫 번째 역량 항목에서 grid 열기
        if(label==='개념 이해도'){
          closeScoreGrid();
          html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">`;
          inScoreGrid=true;
        }
        html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px">`;
        html+=`<div style="font-size:10px;color:var(--text2);margin-bottom:4px">${esc(label)}</div>`;
        html+=`<div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:${col};line-height:1">${score}</div>`;
        html+=`<div style="font-size:9px;color:var(--text3);margin-bottom:6px">/ 10점</div>`;
        if(!isPerfect&&reason&&reason!=='만점'){
          html+=`<div style="font-size:11px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:6px;margin-top:2px">${esc(reason)}</div>`;
        }
        html+=`</div>`;
        continue;
      }

      if(totalM){
        closeScoreGrid();
        html+=`<div style="display:flex;align-items:center;justify-content:flex-end;margin-top:6px;gap:6px">`;
        html+=`<span style="font-size:12px;color:var(--text2)">합계</span>`;
        html+=`<span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green)">${totalM[1]}</span>`;
        html+=`<span style="font-size:11px;color:var(--text3)">/ 30점</span></div>`;
        continue;
      }

      // 일반 - 항목
      closeScoreGrid();
      html+=`<div style="font-size:13px;color:var(--text);line-height:1.8;padding:4px 0 4px 12px;border-left:2px solid var(--border);margin-bottom:2px">${esc(trimmed)}</div>`;
      continue;
    }

    // 파이프 표
    if(/^\|/.test(trimmed)){
      // 구분선 줄 건너뛰기
      if(/^\|[-| ]+\|$/.test(trimmed))continue;
      const cells=trimmed.split('|').map(c=>c.trim()).filter(c=>c);
      if(!cells.length)continue;

      const isHeader=cells.some(c=>['문제','정오답','개념','풀이','해석력','합계'].includes(c));
      if(isHeader&&!inTable){
        closeScoreGrid();
        html+=`<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>`;
        cells.forEach(c=>{html+=`<th style="background:var(--surface2);color:var(--text2);padding:9px 12px;text-align:center;border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap">${esc(c)}</th>`;});
        html+=`</tr></thead><tbody>`;
        inTable=true;
        continue;
      }

      if(inTable){
        const isAvg=cells[0]==='평균'||cells[0].includes('평균');
        html+=`<tr style="${isAvg?'background:var(--surface2);font-weight:700':''}">`;
        cells.forEach(c=>{
          const oxColor=c==='O'?'var(--green)':c==='X'?'var(--red)':'';
          html+=`<td style="padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);${oxColor?`color:${oxColor};font-weight:700`:''}">${esc(c)}</td>`;
        });
        html+=`</tr>`;
        continue;
      }
    }

    // 파이프 표 다음 일반 줄 → 표 닫기
    if(inTable){closeTable();}

    // 빈 줄
    if(!trimmed){html+=`<div style="height:6px"></div>`;continue;}

    // 일반 텍스트
    closeScoreGrid();
    html+=`<div style="font-size:13px;color:var(--text);line-height:1.8">${esc(trimmed)}</div>`;
  }

  closeCard();
  container.innerHTML=html||`<div class="prob-card"><div style="padding:16px 18px;font-size:13px;color:var(--text2)">결과가 없습니다.</div></div>`;
}

async function downloadPDF(){
  const btn=document.getElementById('pdfBtn');
  const rc=document.getElementById('resultContent');
  if(!lastRawText||!rc||!rc.children.length){alert('먼저 분석을 완료해주세요.');return;}
  btn.textContent='⏳ 생성 중...';btn.disabled=true;
  try{
    const{jsPDF}=window.jspdf;
    const d=new Date();
    const fname=`물리1_분석결과_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.pdf`;
    const today=d.toLocaleDateString('ko-KR');
    const SCALE=3;
    const PW=210,PH=297,MG=8,GAP=4;
    const cellW=(PW-MG*2-GAP)/2;
    // 렌더링은 화면 카드 너비(450px)로 해서 레이아웃 유지, PDF에 넣을 때 cellW로 축소
    const RENDER_W=450;

    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,300));

    const allCards=Array.from(rc.children);
    const probCards=allCards.filter(el=>el.classList.contains('prob-card'));
    const totalCards=allCards.filter(el=>el.classList.contains('total-card'));

    // 카드 캡처 (화면 너비 450px 기준으로 렌더링)
    const captureCard=async(cardEl)=>{
      const wrap=document.createElement('div');
      wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${RENDER_W}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
      const cl=cardEl.cloneNode(true);
      cl.style.cssText='width:100%;margin:0;border-radius:8px;box-shadow:none;box-sizing:border-box;';
      cl.querySelectorAll('*').forEach(el=>{
        el.style.maxHeight='none';
        el.style.overflow='visible';
      });
      wrap.appendChild(cl);
      document.body.appendChild(wrap);
      try{
        await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
        await new Promise(r=>setTimeout(r,80));
        const canvas=await html2canvas(wrap,{
          scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,
          width:RENDER_W,windowWidth:RENDER_W,
        });
        return canvas;
      }finally{
        // 오류 발생해도 반드시 DOM에서 제거
        if(document.body.contains(wrap))document.body.removeChild(wrap);
      }
    };

    // canvas → mm 변환: 렌더링 너비(RENDER_W px) = cellW mm
    const canvasToMmH=(canvas)=>(canvas.height/canvas.width)*cellW;

    // 카드가 한 페이지를 넘으면 축소해서 맞춤
    const MAX_ROW_H=PH-MG*2-10; // 한 행 최대 높이

    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    let pageNum=1;
    let curY=MG;
    let isFirstPage=true;

    // 문제 카드 2개씩 행으로 처리 — 각 행 높이는 두 카드 중 큰 것에 맞춤
    for(let i=0;i<probCards.length;i+=2){
      const c1=await captureCard(probCards[i]);
      const c2=probCards[i+1]?await captureCard(probCards[i+1]):null;
      let h1=canvasToMmH(c1);
      let h2=c2?canvasToMmH(c2):0;
      let rowH=Math.max(h1,h2);

      // 행이 너무 크면 페이지 전체로 축소
      if(rowH>MAX_ROW_H){
        const ratio=MAX_ROW_H/rowH;
        h1*=ratio; h2*=ratio; rowH=MAX_ROW_H;
      }

      // 현재 위치에 안 들어가면 새 페이지로
      if(!isFirstPage&&curY+rowH>PH-MG-5){
        pdf.setFontSize(7);pdf.setTextColor(168,164,158);pdf.setFont('helvetica','normal');
        pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
        pdf.text(today,PW-MG,PH-3,{align:'right'});
        pdf.addPage();pageNum++;curY=MG;
      }
      isFirstPage=false;

      // 행 구분선 (첫 행 제외)
      if(curY>MG+1){
        pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);
        pdf.line(MG,curY-GAP/2,PW-MG,curY-GAP/2);
      }
      // 세로 중앙 구분선
      pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);
      pdf.line(MG+cellW+GAP/2,curY,MG+cellW+GAP/2,curY+rowH);

      pdf.addImage(c1.toDataURL('image/jpeg',0.93),'JPEG',MG,curY,cellW,h1);
      if(c2)pdf.addImage(c2.toDataURL('image/jpeg',0.93),'JPEG',MG+cellW+GAP,curY,cellW,h2);
      curY+=rowH+GAP;
    }

    // 마지막 페이지 번호
    pdf.setFontSize(7);pdf.setTextColor(168,164,158);pdf.setFont('helvetica','normal');
    pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
    pdf.text(today,PW-MG,PH-3,{align:'right'});

    // 총평 (별도 페이지)
    if(totalCards.length>0){
      pdf.addPage();pageNum++;
      const TOTAL_RENDER_W=900;
      let ty=MG;
      for(const card of totalCards){
        const wrap=document.createElement('div');
        wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${TOTAL_RENDER_W}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
        const cl=card.cloneNode(true);
        cl.style.cssText='width:100%;margin:0;border-radius:8px;box-shadow:none;';
        cl.querySelectorAll('*').forEach(el=>{el.style.maxHeight='none';el.style.overflow='visible';});
        wrap.appendChild(cl);
        document.body.appendChild(wrap);
        let canvas;
        try{
          await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
          await new Promise(r=>setTimeout(r,80));
          canvas=await html2canvas(wrap,{scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,width:TOTAL_RENDER_W,windowWidth:TOTAL_RENDER_W});
        }finally{
          if(document.body.contains(wrap))document.body.removeChild(wrap);
        }
        const fw=PW-MG*2;
        let fh=canvas.height/canvas.width*fw;
        // 총평 카드도 페이지 높이 초과 시 축소
        if(fh>PH-MG*2){const r=(PH-MG*2)/fh;fh=PH-MG*2;}
        if(ty+fh>PH-MG){pdf.addPage();pageNum++;ty=MG;}
        pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',MG,ty,fw,fh);
        ty+=fh+GAP;
      }
      pdf.setFontSize(7);pdf.setTextColor(168,164,158);
      pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
      pdf.text(today,PW-MG,PH-3,{align:'right'});
    }

    pdf.save(fname);
  }catch(e){
    alert('PDF 생성 오류: '+e.message);console.error(e);
  }finally{
    btn.textContent='⬇ PDF 저장';btn.disabled=false;
  }
}
function initBulkCountBtns(){
  const wrap=document.getElementById('bulk-count-btns');
  if(!wrap)return;
  wrap.innerHTML='';
  for(let i=1;i<=10;i++){
    const btn=document.createElement('button');
    btn.id=`bulk_count_${i}`;
    btn.textContent=i;
    btn.style.cssText='width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;';
    btn.onclick=(function(n,b){return function(){setBulkCount(n,b);};})(i,btn);
    wrap.appendChild(btn);
  }
}

initBulkCountBtns();
setBulkCount(3);
</script>
