<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물리1 풀이 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4f3ef;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --border:#e3e1d9;
  --accent:#2563eb;
  --accent-light:#dbeafe;
  --green:#16a34a;
  --green-light:#dcfce7;
  --red:#dc2626;
  --red-light:#fee2e2;
  --yellow:#d97706;
  --yellow-light:#fef9c3;
  --blue:#0369a1;
  --blue-light:#e0f2fe;
  --text:#1a1917;
  --text2:#6b6860;
  --text3:#a8a49e;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:14px;line-height:1.7;}

/* ── 헤더 ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:900;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text3);}
.api-wrap{display:flex;align-items:center;gap:8px;}
.api-label{font-size:11px;color:var(--text2);white-space:nowrap;}
.api-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;outline:none;width:200px;transition:border-color .15s;}
.api-input:focus{border-color:var(--accent);}
@media(max-width:600px){.api-input{width:120px;}.header-sub{display:none;}}

/* ── 컨테이너 ── */
.container{max-width:900px;margin:0 auto;padding:20px 16px 120px;}

/* ── 입력 카드 ── */
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;}
.input-card-header{padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:space-between;}
.upload-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.upload-grid{grid-template-columns:1fr;}}
.upload-zone{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.upload-zone-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.upload-zone-title{font-size:12px;font-weight:700;color:var(--text2);}
.upload-drop{padding:18px 12px;text-align:center;cursor:pointer;transition:background .12s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.upload-drop:hover{background:var(--accent-light);}
.upload-drop-icon{font-size:24px;}
.upload-drop-text{font-size:12px;color:var(--text2);}
.upload-drop-sub{font-size:10px;color:var(--text3);}
.upload-file-input{display:none;}
.preview-grid{padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;}
.img-wrap{position:relative;display:inline-block;}
.img-thumb{width:72px;height:72px;object-fit:cover;border-radius:7px;border:1px solid var(--border);display:block;cursor:pointer;transition:transform .1s;}
.img-thumb:hover{transform:scale(1.05);}
.pdf-thumb{width:72px;height:72px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:20px;}
.pdf-thumb-name{font-size:8px;color:var(--text2);text-align:center;padding:0 3px;word-break:break-all;max-width:68px;}
.img-remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.img-name{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.add-btn{width:72px;height:72px;border:2px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--text3);background:transparent;transition:all .12s;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}
.img-badge{background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'JetBrains Mono',monospace;}
.zone-textarea{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;line-height:1.7;padding:10px 14px;resize:vertical;min-height:56px;outline:none;}
.zone-textarea::placeholder{color:var(--text3);}

/* ── 정답 입력 ── */
.answer-grid{display:grid;gap:6px;margin-top:8px;}
.answer-row{display:flex;align-items:center;gap:8px;}
.answer-num{font-size:12px;font-weight:600;color:var(--text2);width:28px;flex-shrink:0;}
.answer-btns{display:flex;gap:3px;flex-wrap:wrap;}
.ans-btn{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center;}
.ans-btn:hover{border-color:var(--accent);color:var(--accent);}
.ans-btn.selected-correct{background:var(--accent);color:#fff;border-color:var(--accent);}
.ans-btn.selected-student{background:var(--surface2);color:var(--text);border-color:var(--text2);font-weight:700;}
.count-btns{display:flex;gap:4px;flex-wrap:wrap;}
.count-btn{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .1s;}
.count-btn:hover{border-color:var(--accent);color:var(--accent);}
.count-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── 분석 버튼 ── */
.analyze-wrap{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;justify-content:center;z-index:100;}
.analyze-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:460px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(37,99,235,.35);}
.analyze-btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);}
.analyze-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* ── 결과 화면 ── */
.result-section{display:none;}
.result-section.visible{display:block;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.result-title{font-size:16px;font-weight:700;}
.result-actions{display:flex;gap:8px;}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;transition:all .12s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.pdf-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;transition:all .12s;}
.pdf-btn:hover{background:#1d4ed8;}
.pdf-btn:disabled{opacity:.6;cursor:not-allowed;}

/* ── 결과 카드 ── */
.prob-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);}
.prob-card-header{padding:13px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.prob-card-title{font-size:14px;font-weight:700;}
.prob-card-body{padding:18px 20px 20px;}
.total-card{background:var(--surface);border:2px solid var(--text);border-radius:14px;margin-top:20px;overflow:hidden;box-shadow:var(--shadow-lg);}
.total-card-header{padding:15px 20px;background:var(--text);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.total-card-body{padding:18px 20px 20px;}

/* ── 섹션 라벨 ── */
.sec-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px;}
.sec-label:first-child{margin-top:0;}
.sec-bar{width:3px;height:13px;border-radius:2px;flex-shrink:0;}

/* ── 정답/정오답 ── */
.answer-display{font-size:22px;font-weight:700;color:var(--accent);padding:3px 0;}
.ox-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:7px;margin-top:2px;font-weight:700;font-size:14px;}

/* ── 풀이 단계 ── */
.step-wrap{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.step-row{display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border-radius:8px;padding:9px 13px;}
.step-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-light);min-width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-text{font-size:13px;color:var(--text);line-height:1.65;}

/* ── 학생 풀이 박스 ── */
.student-box{background:#fafaf9;border:1px solid var(--border);border-radius:9px;padding:12px 15px;margin-top:4px;display:flex;flex-direction:column;gap:5px;}
.student-row{font-size:13px;color:var(--text);line-height:1.75;}
.student-label{font-weight:600;color:var(--text2);}

/* ── 피드백 박스 ── */
.feedback-box{background:var(--blue-light);border:1px solid #bae6fd;border-radius:9px;padding:12px 15px;margin-top:4px;display:flex;flex-direction:column;gap:5px;}
.feedback-row{font-size:13px;color:#0c4a6e;line-height:1.75;}
.feedback-label{font-weight:700;color:#075985;}

/* ── 역량 점수 ── */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.score-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;}
.score-cell-label{font-size:10px;color:var(--text2);margin-bottom:5px;}
.score-cell-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;line-height:1;}
.score-cell-max{font-size:9px;color:var(--text3);margin-top:2px;margin-bottom:6px;}
.score-cell-reason{font-size:11px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:6px;margin-top:3px;}
.score-total{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:10px;padding-top:10px;border-top:2px solid var(--border);}
.score-total-label{font-size:12px;color:var(--text2);font-weight:600;}
.score-total-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;}
.score-total-max{font-size:12px;color:var(--text3);}

/* ── 총평 표 ── */
.total-table-wrap{overflow-x:auto;margin:8px 0;}
.total-table{width:100%;border-collapse:collapse;font-size:12px;}
.total-table th{background:var(--surface2);color:var(--text2);padding:9px 12px;text-align:center;border-bottom:2px solid var(--border);font-weight:700;white-space:nowrap;}
.total-table td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);}
.total-table tr.avg-row{background:var(--surface2);font-weight:700;}

/* ── 총평 섹션 텍스트 ── */
.total-section-text{font-size:13px;color:var(--text);line-height:1.85;padding:2px 0;}

/* ── 로딩 ── */
.loading-wrap{padding:48px 16px;text-align:center;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--text2);font-size:13px;line-height:1.7;}

/* ── 오류 박스 ── */
.error-box{background:var(--red-light);border:1px solid #fca5a5;border-radius:10px;padding:14px 16px;color:var(--red);font-size:13px;margin-bottom:12px;line-height:1.6;}

/* ── 라이트박스 ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:999;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;}
.lightbox-close{position:absolute;top:18px;right:22px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}

/* ── 스트림 텍스트 ── */
.stream-text{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:keep-all;}

/* ── 일반 텍스트 ── */
.plain-text{font-size:13px;color:var(--text);line-height:1.85;}
.bullet-row{font-size:13px;color:var(--text);line-height:1.8;padding:3px 0 3px 14px;border-left:2px solid var(--border);margin-bottom:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">⚡</div>
    <div>
      <div class="header-title">물리1 풀이 분석기</div>
      <div class="header-sub">Gemini AI 기반 역량 피드백</div>
    </div>
  </div>
  <div class="api-wrap">
    <button id="mockToggle" onclick="toggleMock()" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);cursor:pointer;font-weight:600;">🧪 목업 OFF</button>
    <span class="api-label">🔑 API Key</span>
    <input class="api-input" type="password" id="apiKey" placeholder="AIza... (Google AI Studio)"/>
  </div>
</div>

<div id="mockBanner" style="display:none;background:#fef3c7;border-bottom:1px solid #fde68a;padding:8px 20px;text-align:center;font-size:12px;color:#92400e;font-weight:600;">
  🧪 목업 모드 — API 호출 없이 샘플 결과를 표시합니다
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="container">
  <div id="inputView">

    <!-- 문제 범위 -->
    <div class="input-card">
      <div class="input-card-header">📌 분석할 문제 범위 (선택)</div>
      <div style="padding:12px 16px;">
        <textarea id="bulk-range" class="zone-textarea" style="border-top:none;min-height:44px;" placeholder="예: 5번~9번 문제 / 비워두면 이미지에서 자동으로 모든 문제를 찾습니다"></textarea>
      </div>
    </div>

    <!-- 정답 입력 -->
    <div class="input-card">
      <div class="input-card-header">
        <span>✅ 정답 입력 (선택 — 입력하면 정확도가 크게 올라갑니다)</span>
        <div class="count-btns" id="countBtns"></div>
      </div>
      <div style="padding:12px 16px;" id="answerGrid"></div>
    </div>

    <!-- 파일 업로드 3칸 -->
    <div class="upload-grid">
      <!-- 문제 -->
      <div class="upload-zone">
        <div class="upload-zone-header">
          <span class="upload-zone-title">📝 문제 사진/PDF</span>
          <span class="img-badge" id="badge-q" style="display:none"></span>
        </div>
        <label class="upload-drop" for="file-q">
          <span class="upload-drop-icon">📷</span>
          <span class="upload-drop-text">사진 / PDF 추가</span>
          <span class="upload-drop-sub">여러 파일 OK</span>
        </label>
        <input class="upload-file-input" type="file" id="file-q" accept="image/*,application/pdf" multiple onchange="handleUpload('q',this)"/>
        <div class="preview-grid" id="preview-q"></div>
        <textarea class="zone-textarea" id="text-q" placeholder="또는 텍스트 직접 입력"></textarea>
      </div>
      <!-- 해설 -->
      <div class="upload-zone">
        <div class="upload-zone-header">
          <span class="upload-zone-title">📖 해설 사진/PDF</span>
          <span class="img-badge" id="badge-a" style="display:none"></span>
        </div>
        <label class="upload-drop" for="file-a">
          <span class="upload-drop-icon">📷</span>
          <span class="upload-drop-text">사진 / PDF 추가</span>
          <span class="upload-drop-sub">가장 중요합니다</span>
        </label>
        <input class="upload-file-input" type="file" id="file-a" accept="image/*,application/pdf" multiple onchange="handleUpload('a',this)"/>
        <div class="preview-grid" id="preview-a"></div>
        <textarea class="zone-textarea" id="text-a" placeholder="또는 텍스트 직접 입력"></textarea>
      </div>
      <!-- 학생 풀이 -->
      <div class="upload-zone">
        <div class="upload-zone-header">
          <span class="upload-zone-title">✏️ 학생 풀이 사진</span>
          <span class="img-badge" id="badge-s" style="display:none"></span>
        </div>
        <label class="upload-drop" for="file-s">
          <span class="upload-drop-icon">📷</span>
          <span class="upload-drop-text">사진 / PDF 추가</span>
          <span class="upload-drop-sub">손글씨 OK</span>
        </label>
        <input class="upload-file-input" type="file" id="file-s" accept="image/*,application/pdf" multiple onchange="handleUpload('s',this)"/>
        <div class="preview-grid" id="preview-s"></div>
        <textarea class="zone-textarea" id="text-s" placeholder="또는 텍스트 직접 입력"></textarea>
      </div>
    </div>

  </div><!-- #inputView -->

  <!-- 결과 화면 -->
  <div id="resultView" class="result-section">
    <div class="result-header">
      <div class="result-title">📊 분석 결과</div>
      <div class="result-actions">
        <button class="pdf-btn" id="pdfBtn" onclick="downloadPDF()">⬇ PDF 저장</button>
        <button class="back-btn" onclick="goBack()">← 다시 입력</button>
      </div>
    </div>
    <div id="resultContent"></div>
  </div>
</div>

<div class="analyze-wrap" id="analyzeWrap">
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">⚡ 풀이 분석 시작</button>
</div>

<script>
// ──────────────────────────────────────────────
// 전역 상태
// ──────────────────────────────────────────────
const store = {q:[],a:[],s:[]};
const correctAnswers = {};   // {문제번호: '①'...}
const studentAnswers = {};   // {문제번호: '①'...}
let problemCount = 5;
let isMock = false;
let isAnalyzing = false;
let lastRawText = '';

// 모델 설정
const MODEL = {
  ocr: 'gemini-2.5-flash-lite',       // OCR/추출용 (빠름)
  analysis: 'gemini-2.5-flash-lite',   // 분석용
  fallback: 'gemini-2.5-flash',        // quota 초과 시 fallback
};

// ──────────────────────────────────────────────
// MOCK 데이터
// ──────────────────────────────────────────────
const MOCK_RESPONSE = `=====
문제 5 피드백
=====
▶ 1. 정답
③
▶ 2. 정오답 판단
X
▶ 3. 문제 풀이법
1단계: 받침점 기준 돌림힘 평형 조건 적용 — 시계 방향 합 = 반시계 방향 합
2단계: 각 힘의 작용점 파악 — F(반시계, d), 나무판 20N(시계, 4d), 물체 50N(시계, 9d)
3단계: F x d = 20N x 4d + 50N x 9d = 80d + 450d = 530d
4단계: F = 530N → 정답 ③
▶ 4. 학생 풀이 정리

function handleUpload(key, input) {
  Array.from(input.files).forEach(file => {
    const isPdf = file.type === 'application/pdf';
    const reader = new FileReader();
    reader.onload = e => {
      store[key].push({
        base64: e.target.result.split(',')[1],

        name: file.name,

// 핵심 API 호출 — 재시도 포함
// ──────────────────────────────────────────────
async function callProxy({parts, system='', stream=false, model=MODEL.ocr, attempt=0, setMsgFn=null}) {
  const apiKey = document.getElementById('apiKey').value.trim();
  const res = await fetch('/api/proxy', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({apiKey, system, stream, model, messages:[{role:'user', content:parts}]}),
  });

  if (!res.ok) {
    const raw = await res.text();
    let errMsg = 'API 오류', retryAfter = 65;
    try { const j = JSON.parse(raw); errMsg = j.error?.message||errMsg; retryAfter = j.retryAfter||65; } catch { errMsg = raw.slice(0,200); }
    // 모델명 제거
    errMsg = errMsg.replace(/model:\s*gemini[\w.-]*/gi,'').replace(/\s{2,}/g,' ').trim();

    if (res.status === 429 && attempt < 2) {
      if (setMsgFn) setMsgFn(`⏳ quota 초과 — ${retryAfter}초 후 자동 재시도... (${attempt+1}/2)`);
      await sleep(retryAfter * 1000);
      return callProxy({parts, system, stream, model: attempt>=1 ? MODEL.fallback : model, attempt: attempt+1, setMsgFn});
    }
    throw new Error(errMsg);
  }

  if (!stream) {
    const raw = await res.text();
    try { const d = JSON.parse(raw); return d.content?.map(c=>c.text||'').join('').trim()||''; } catch { return ''; }
  }
  return res; // 스트리밍은 Response 반환
}

async function streamResponse(res, onChunk) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream:true});
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (d === '[DONE]') continue;
      try { const j = JSON.parse(d); if (j.type==='content_block_delta'&&j.delta?.text) onChunk(j.delta.text); } catch {}
    }
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function buildParts(prompt, files) {
  const p = [{type:'text', text:prompt}];
  files.forEach((f, i) => {
    p.push({type:'text', text:`파일${i+1}: ${f.name}`});
    if (f.isPdf) p.push({type:'document', source:{type:'base64', media_type:'application/pdf', data:f.base64}});
    else p.push({type:'image', source:{type:'base64', media_type:f.mediaType, data:f.base64}});
  });
  return p;
}

    // 해설 원문
    if (solutionOcrText) {
      analysisParts.push({type:'text', text:`[해설 원문 — 절대 기준]\n이 텍스트와 원본 이미지를 함께 참고하세요. 텍스트와 이미지가 다르면 이미지 우선.\n\n${solutionOcrText}`});
    }
    // 해설 원본 이미지도 함께 전달 (텍스트 오류 보정용)
    if (aT && !store.a.length) {
      analysisParts.push({type:'text', text:`[해설 텍스트 입력]\n${aT}`});
    }
    store.a.forEach((f,i) => {
      analysisParts.push({type:'text', text:`해설원본${i+1}`});
      if (f.isPdf) analysisParts.push({type:'document', source:{type:'base64', media_type:'application/pdf', data:f.base64}});
      else analysisParts.push({type:'image', source:{type:'base64', media_type:f.mediaType, data:f.base64}});
    });

    // 문제
    if (qT) analysisParts.push({type:'text', text:`[문제 텍스트]\n${qT}`});
    store.q.forEach((f,i) => {
      analysisParts.push({type:'text', text:`문제이미지${i+1}`});
      if (f.isPdf) analysisParts.push({type:'document', source:{type:'base64', media_type:'application/pdf', data:f.base64}});
      else analysisParts.push({type:'image', source:{type:'base64', media_type:f.mediaType, data:f.base64}});
    });

    // 학생 풀이
    if (studentOcrText) {
      analysisParts.push({type:'text', text:`[학생 풀이 OCR]\n${studentOcrText}`});
    }
    if (sT && !store.s.length) {
      analysisParts.push({type:'text', text:`[학생 풀이 텍스트]\n${sT}`});
    }
    store.s.forEach((f,i) => {
      analysisParts.push({type:'text', text:`학생풀이이미지${i+1}`});
      if (f.isPdf) analysisParts.push({type:'document', source:{type:'base64', media_type:'application/pdf', data:f.base64}});
      else analysisParts.push({type:'image', source:{type:'base64', media_type:f.mediaType, data:f.base64}});
    });

    // 정답/학생 정답
    const corrList = Object.entries(correctAnswers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    const studList = Object.entries(studentAnswers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    let ansText = '';
    if (corrList.length) ansText += `\n[정답]\n${corrList.map(([n,v])=>`${n}번: ${v}`).join('\n')}`;
    if (studList.length) ansText += `\n[학생 선택]\n${studList.map(([n,v])=>`${n}번: ${v}`).join('\n')}`;

    const instruction = `${range ? `분석 범위: ${range}\n` : ''}${ansText ? ansText + '\n' : ''}
출력 형식 (=====로 시작, 앞 설명 없이):
${FMT_PROBLEM.replace(/문제N/g,'문제N(번호)')}

마지막에 총평:
${FMT_TOTAL}`;
    analysisParts.push({type:'text', text:instruction});

    // 스트리밍 분석 실행
    rc.innerHTML = '';
    const sc = document.createElement('div');
    sc.className = 'prob-card';
    sc.innerHTML = `<div class="prob-card-body"><div class="stream-text" id="streamOut"></div></div>`;
    rc.appendChild(sc);
    const streamEl = document.getElementById('streamOut');
    let fullText = '';

    const res = await callProxy({
      parts: analysisParts,
      system: SYSTEM_ANALYSIS,
      stream: true,
      model: MODEL.analysis,
      setMsgFn: setMsg,
    });
    await streamResponse(res, chunk => {
      fullText += chunk;
      streamEl.textContent = fullText;
    });

    if (!fullText.trim()) throw new Error('분석 결과가 없습니다. 해설 이미지를 확인해주세요.');

    rc.innerHTML = '';
    renderResult(fullText, rc);

  } catch(e) {
    rc.innerHTML = `<div class="error-box">⚠️ 오류: ${e.message}<br><small>quota 초과라면 1~2분 후 다시 시도해주세요. 해설 이미지가 선명할수록 정확도가 올라갑니다.</small></div>
      <button class="back-btn" onclick="goBack()" style="margin-top:8px">← 다시 시도</button>`;
  } finally {
    isAnalyzing = false;
    btn.disabled = false; btn.textContent = '⚡ 풀이 분석 시작';
    const lw = rc.querySelector('.loading-wrap');
    if (lw) lw.remove();
  }
}

// ──────────────────────────────────────────────
// OCR 오인식 교정
// ──────────────────────────────────────────────
function correctPhysicsText(text) {
  const fixes = [
    [/출퇴/g,'출제'],[/질감/g,'질량'],[/무계\b/g,'무게'],[/막돼/g,'막대'],
    [/수직\s*횡력/g,'수직항력'],[/마철/g,'마찰'],[/도르\s*래/g,'도르래'],
    [/운동\s*에네지/g,'운동 에너지'],[/역학적\s*에네지/g,'역학적 에너지'],
    [/퍼텐\s*셜/g,'퍼텐셜'],[/돌림\s*힘/g,'돌림힘'],[/알짜\s*힘/g,'알짜힘'],
    [/충격\s*량/g,'충격량'],[/운동\s*량/g,'운동량'],[/탄성\s*력/g,'탄성력'],
  ];
  let r = text;
  fixes.forEach(([p,s]) => { r = r.replace(p,s); });
  return r;
}

// ──────────────────────────────────────────────
// renderResult — 보고서 형식 렌더러
// ──────────────────────────────────────────────
function renderResult(text, container) {
  lastRawText = text;
  const corrected = correctPhysicsText(text);
  container.innerHTML = '';

  // preamble 제거
  const firstSep = corrected.indexOf('=====');
  const clean = firstSep > 0 ? corrected.slice(firstSep) : corrected;
  const lines = clean.split('\n');

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = '', inCard = false, inScoreGrid = false, inTable = false;
  let curSection = '';
  let feedbackItems = [], studentItems = [];

  const flushFeedback = () => {
    if (feedbackItems.length) {
      html += `<div class="feedback-box">` + feedbackItems.map(({label,val}) =>
        `<div class="feedback-row"><span class="feedback-label">${esc(label)}</span> ${esc(val)}</div>`
      ).join('') + `</div>`;
      feedbackItems = [];
    }
  };
  const flushStudent = () => {
    if (studentItems.length) {
      html += `<div class="student-box">` + studentItems.map(({label,val}) =>
        `<div class="student-row"><span class="student-label">${esc(label)}</span> ${esc(val)}</div>`
      ).join('') + `</div>`;
      studentItems = [];
    }
  };
  const closeScoreGrid = () => { if(inScoreGrid){html+=`</div>`;inScoreGrid=false;} };
  const closeTable = () => { if(inTable){html+=`</tbody></table></div>`;inTable=false;} };
  const flushAll = () => { flushFeedback(); flushStudent(); closeScoreGrid(); closeTable(); };
  const closeCard = () => {
    flushAll();
    if(inCard){html+=`</div></div>`;inCard=false;}
    curSection='';
  };

  const openCard = (title, isSummary) => {
    closeCard();
    if (isSummary) {
      html += `<div class="total-card"><div class="total-card-header">📊 ${esc(title)}</div><div class="total-card-body">`;
    } else {
      const num = (title.match(/(\d+)/)||[])[1]||'';
      html += `<div class="prob-card"><div class="prob-card-header"><span class="prob-card-title">문제 ${num}번 피드백</span></div><div class="prob-card-body">`;
    }
    inCard = true;
  };

  // 섹션 색상 매핑
  const SEC_COLORS = {
    '정답': {bar:'var(--accent)', text:'var(--accent)'},
    '정오답': {bar:'var(--text2)', text:'var(--text2)'},
    '풀이법': {bar:'#7c3aed', text:'#7c3aed'},
    '학생': {bar:'var(--yellow)', text:'var(--yellow)'},
    '피드백': {bar:'var(--blue)', text:'var(--blue)'},
    '역량': {bar:'var(--green)', text:'var(--green)'},
  };
  const getSecColor = label => {
    for (const [k,v] of Object.entries(SEC_COLORS)) if(label.includes(k)) return v;
    return {bar:'var(--accent)', text:'var(--accent)'};
  };

  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();

    // ===== 카드 구분
    if (/^={4,}/.test(trimmed)) {
      const next = (lines[i+1]||'').trim();
      if (next && !/^={4,}/.test(next)) {
        i++;
        openCard(next, next === '총평' || next.includes('총평'));
        if ((lines[i+1]||'').trim().match(/^={4,}/)) i++;
      }
      continue;
    }

    if (!inCard) { html+=`<div class="prob-card"><div class="prob-card-body">`; inCard=true; }

    // ▶ 섹션 헤더
    if (/^▶/.test(trimmed)) {
      flushAll();
      const label = trimmed.replace(/^▶\s*\d+\.\s*/,'').replace(/^▶\s*/,'');
      curSection = label;
      const col = getSecColor(label);
      html += `<div class="sec-label" style="color:${col.text}"><span class="sec-bar" style="background:${col.bar}"></span>${esc(label)}</div>`;
      continue;
    }

    // 풀이 단계 (N단계:)
    if (/^\d+단계[:\s]/.test(trimmed)) {
      flushFeedback(); flushStudent();
      const nm = trimmed.match(/^(\d+)단계[:\s]+(.*)/);
      if (nm) { html += `<div class="step-row"><span class="step-num">${nm[1]}</span><span class="step-text">${esc(nm[2])}</span></div>`; continue; }
    }

    // - 항목
    if (/^-\s+/.test(trimmed)) {
      const scoreM = trimmed.match(/^-\s+(개념 이해도|풀이 전개력|문제 해석력):\s*(\d+)점\s*\/\s*10점(?:\s*\|\s*이유:\s*(.*))?/);
      const totalM = trimmed.match(/^-\s+합계:\s*(\d+)점\s*\/\s*30점/);

      if (scoreM) {
        flushFeedback(); flushStudent();
        const [,label,scoreStr,reason] = scoreM;
        const score = parseInt(scoreStr);
        const col = score===10?'var(--green)':score>=8?'var(--accent)':score>=6?'var(--yellow)':'var(--red)';
        if (label==='개념 이해도') { closeScoreGrid(); html+=`<div class="score-grid">`; inScoreGrid=true; }
        html += `<div class="score-cell"><div class="score-cell-label">${esc(label)}</div>
          <div class="score-cell-val" style="color:${col}">${score}</div>
          <div class="score-cell-max">/ 10점</div>
          ${reason&&reason!=='만점'?`<div class="score-cell-reason">${esc(reason)}</div>`:''}
          </div>`;
        continue;
      }

      if (totalM) {
        closeScoreGrid();
        const total = parseInt(totalM[1]);
        const col = total>=25?'var(--green)':total>=18?'var(--accent)':total>=12?'var(--yellow)':'var(--red)';
        html += `<div class="score-total"><span class="score-total-label">총점</span>
          <span class="score-total-val" style="color:${col}">${total}</span>
          <span class="score-total-max">/ 30점</span></div>`;
        continue;
      }

      // 피드백 항목
      if (curSection.includes('피드백')) {
        flushStudent();
        const colon = trimmed.indexOf(':');
        if (colon > 2) feedbackItems.push({label: trimmed.slice(2,colon+1), val: trimmed.slice(colon+1).trim()});
        else feedbackItems.push({label:'', val:trimmed.slice(2)});
        continue;
      }

      // 학생 풀이 항목
      if (curSection.includes('학생')) {
        flushFeedback();
        const colon = trimmed.indexOf(':');
        if (colon > 2) studentItems.push({label: trimmed.slice(2,colon+1), val: trimmed.slice(colon+1).trim()});
        else studentItems.push({label:'', val:trimmed.slice(2)});
        continue;
      }

      flushFeedback(); flushStudent();
      html += `<div class="bullet-row">${esc(trimmed)}</div>`;
      continue;
    }

    // 파이프 표 (총평 점수표)
    if (/^\|/.test(trimmed)) {
      if (/^\|[-| ]+\|$/.test(trimmed)) continue;
      const cells = trimmed.split('|').map(c=>c.trim()).filter(c=>c);
      if (!cells.length) continue;
      flushAll();

      const isHeader = cells.some(c=>['문제','정오답','개념','풀이','해석력','합계','이해도','전개력'].includes(c));
      if (isHeader && !inTable) {
        html += `<div class="total-table-wrap"><table class="total-table"><thead><tr>`;
        cells.forEach(c => { html += `<th>${esc(c)}</th>`; });
        html += `</tr></thead><tbody>`;
        inTable = true; continue;
      }
      if (inTable) {
        const isAvg = cells[0]==='평균'||cells[0].includes('평균');
        html += `<tr${isAvg?' class="avg-row"':''}>`;
        cells.forEach(c => {
          const isO=c==='O', isX=c==='X';
          html += `<td style="${isO?'color:var(--green);font-weight:700':isX?'color:var(--red);font-weight:700':''}">${isO?'✅':isX?'❌':esc(c)}</td>`;
        });
        html += `</tr>`; continue;
      }
    }

    if (inTable && !/^\|/.test(trimmed)) closeTable();

    // 빈 줄
    if (!trimmed) { flushFeedback(); flushStudent(); html += `<div style="height:5px"></div>`; continue; }

    // 정답 (원문자)
    if (curSection.includes('정답') && !curSection.includes('정오답') && /^[①②③④⑤]/.test(trimmed)) {
      html += `<div class="answer-display">${esc(trimmed)}</div>`; continue;
    }

    // O/X 정오답
    if (curSection.includes('정오답')) {
      const isO = /^[Oo오]$/.test(trimmed)||trimmed==='O', isX = /^[Xx엑]$/.test(trimmed)||trimmed==='X';
      if (isO||isX) {
        html += `<div class="ox-badge" style="background:${isO?'var(--green-light)':'var(--red-light)'};color:${isO?'var(--green)':'var(--red)'}">
          ${isO?'⭕ 정답':'❌ 오답'}</div>`; continue;
      }
    }

    // 일반 텍스트
    flushFeedback(); flushStudent();
    html += `<div class="plain-text">${esc(trimmed)}</div>`;
  }

  closeCard();
  container.innerHTML = html || `<div class="prob-card"><div class="prob-card-body"><div class="plain-text" style="color:var(--text2)">결과가 없습니다.</div></div></div>`;
}

// ──────────────────────────────────────────────
// PDF 다운로드
// ──────────────────────────────────────────────
async function downloadPDF() {
  const btn = document.getElementById('pdfBtn');
  const rc = document.getElementById('resultContent');
  if (!lastRawText || !rc || !rc.children.length) { alert('먼저 분석을 완료해주세요.'); return; }
  btn.textContent = '⏳ 생성 중...'; btn.disabled = true;
  try {
    const {jsPDF} = window.jspdf;
    const d = new Date();
    const fname = `물리1_분석결과_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.pdf`;
    const today = d.toLocaleDateString('ko-KR');
    const SCALE=3, PW=210, PH=297, MG=8, GAP=4;
    const cellW = (PW-MG*2-GAP)/2;
    const RENDER_W = 450;
    const MAX_ROW_H = PH-MG*2-10;

    await document.fonts.ready;
    await sleep(300);

    const probCards = Array.from(rc.querySelectorAll('.prob-card'));
    const totalCards = Array.from(rc.querySelectorAll('.total-card'));

    const captureCard = async (cardEl) => {
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:fixed;left:-9999px;top:0;width:${RENDER_W}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
      const cl = cardEl.cloneNode(true);
      cl.style.cssText = 'width:100%;margin:0;border-radius:8px;box-shadow:none;box-sizing:border-box;';
      cl.querySelectorAll('*').forEach(el => { el.style.maxHeight='none'; el.style.overflow='visible'; });
      wrap.appendChild(cl);
      document.body.appendChild(wrap);
      try {
        await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
        await sleep(80);
        return await html2canvas(wrap, {scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,width:RENDER_W,windowWidth:RENDER_W});
      } finally {
        if (document.body.contains(wrap)) document.body.removeChild(wrap);
      }
    };

    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    let pageNum = 1, curY = MG;

    // 문제 카드 2열 배치
    for (let i = 0; i < probCards.length; i += 2) {
      const c1 = await captureCard(probCards[i]);
      const c2 = probCards[i+1] ? await captureCard(probCards[i+1]) : null;
      let h1 = (c1.height/c1.width)*cellW;
      let h2 = c2 ? (c2.height/c2.width)*cellW : 0;
      let rowH = Math.max(h1, h2);
      if (rowH > MAX_ROW_H) { const r=MAX_ROW_H/rowH; h1*=r; h2*=r; rowH=MAX_ROW_H; }

      if (curY > MG && curY+rowH > PH-MG-5) {
        pdf.setFontSize(7);pdf.setTextColor(168,164,158);
        pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
        pdf.text(today,PW-MG,PH-3,{align:'right'});
        pdf.addPage(); pageNum++; curY=MG;
      }
      if (curY > MG+1) { pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);pdf.line(MG,curY-GAP/2,PW-MG,curY-GAP/2); }
      pdf.setDrawColor(226,224,216);pdf.setLineWidth(0.2);pdf.line(MG+cellW+GAP/2,curY,MG+cellW+GAP/2,curY+rowH);
      pdf.addImage(c1.toDataURL('image/jpeg',0.93),'JPEG',MG,curY,cellW,h1);
      if (c2) pdf.addImage(c2.toDataURL('image/jpeg',0.93),'JPEG',MG+cellW+GAP,curY,cellW,h2);
      curY += rowH+GAP;
    }
    pdf.setFontSize(7);pdf.setTextColor(168,164,158);
    pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
    pdf.text(today,PW-MG,PH-3,{align:'right'});

    // 총평 별도 페이지
    if (totalCards.length) {
      pdf.addPage(); pageNum++;
      const TW = 900; let ty = MG;
      for (const card of totalCards) {
        const wrap = document.createElement('div');
        wrap.style.cssText = `position:fixed;left:-9999px;top:0;width:${TW}px;background:#fff;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;`;
        const cl = card.cloneNode(true);
        cl.style.cssText = 'width:100%;margin:0;border-radius:8px;box-shadow:none;';
        cl.querySelectorAll('*').forEach(el=>{el.style.maxHeight='none';el.style.overflow='visible';});
        wrap.appendChild(cl); document.body.appendChild(wrap);
        let canvas;
        try {
          await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
          await sleep(80);
          canvas = await html2canvas(wrap, {scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,width:TW,windowWidth:TW});
        } finally {
          if (document.body.contains(wrap)) document.body.removeChild(wrap);
        }
        const fw=PW-MG*2; let fh=canvas.height/canvas.width*fw;
        if (fh > PH-MG*2) fh=PH-MG*2;
        if (ty+fh > PH-MG) { pdf.addPage(); pageNum++; ty=MG; }
        pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',MG,ty,fw,fh);
        ty += fh+GAP;
      }
      pdf.setFontSize(7);pdf.setTextColor(168,164,158);
      pdf.text(`${pageNum}`,PW/2,PH-3,{align:'center'});
      pdf.text(today,PW-MG,PH-3,{align:'right'});
    }
    pdf.save(fname);
  } catch(e) {
    alert('PDF 생성 오류: '+e.message); console.error(e);
  } finally {
    btn.textContent='⬇ PDF 저장'; btn.disabled=false;
  }
}
